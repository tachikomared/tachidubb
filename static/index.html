<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TachiDUBB Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0d;
    --bg-1: #101014;
    --bg-2: #16161c;
    --bg-3: #1d1d25;
    --line: #24242e;
    --line-2: #2f2f3c;
    --ink: #ece9e0;
    --ink-2: #a3a096;
    --ink-3: #5a5a63;
    --ink-4: #35353d;
    --accent: oklch(0.88 0.18 125);
    --accent-dim: oklch(0.88 0.18 125 / 0.15);
    --accent-glow: oklch(0.88 0.18 125 / 0.4);
    --warn: oklch(0.78 0.15 60);
    --err: oklch(0.7 0.2 25);
    --serif: 'Instrument Serif', ui-serif, Georgia, serif;
    --sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }
  #root { width: 100vw; height: 100vh; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  button { font-family: inherit; font-size: inherit; color: inherit; background: none; border: none; cursor: pointer; letter-spacing: inherit; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; background: transparent; border: none; outline: none; }

  .serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: var(--mono); font-size: 11px; letter-spacing: -0.01em; }
  .caps { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  /* Noise overlay — Tachi signature */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.8'/%3E%3C/svg%3E");
  }

  .three-canvas { width: 100%; height: 100%; display: block; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 12px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    color: var(--ink-2);
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--line-2); color: var(--ink); background: var(--bg-2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--line); color: var(--ink-2); background: var(--bg-1); }
  .btn-primary {
    background: var(--accent);
    color: #0a0a0d;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover { filter: brightness(1.1); border-color: var(--accent); color: #0a0a0d; background: var(--accent); }
  .btn-primary:disabled { background: var(--bg-2); color: var(--ink-3); border-color: var(--line); }
  .btn-primary:disabled:hover { filter: none; }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { border-color: var(--line); background: var(--bg-1); }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    color: var(--ink-2);
    font-size: 11px;
    font-weight: 500;
  }
  .chip.accent { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-dim); }

  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .panel { background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px; }

  .field {
    padding: 8px 10px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--ink);
    transition: border-color 0.12s;
    width: 100%;
    font-size: 12.5px;
  }
  .field:hover { border-color: var(--line-2); }
  .field:focus { border-color: var(--accent); }

  .tab {
    padding: 8px 2px;
    color: var(--ink-3);
    font-size: 12px;
    font-weight: 500;
    border-bottom: 1px solid transparent;
    cursor: pointer;
    transition: color 0.12s, border-color 0.12s;
  }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }

  .scroll { overflow-y: auto; overflow-x: hidden; }
  .scroll::-webkit-scrollbar { width: 4px; }

  /* Drop zone for file upload */
  .dropzone {
    border: 1px dashed var(--line-2);
    border-radius: 10px;
    padding: 28px 20px;
    text-align: center;
    background: var(--bg-1);
    cursor: pointer;
    transition: all 0.15s;
  }
  .dropzone:hover { border-color: var(--accent-dim); background: var(--bg-2); }
  .dropzone.dragging { border-color: var(--accent); background: var(--accent-dim); }
</style>
</head>

// Active job status set (any of these = job is running on the server)
const ACTIVE_STATUSES = new Set([
  'queued', 'running', 'downloading', 'extracting', 'resuming',
  'transcribing', 'diarizing', 'translating', 'synthesizing',
  'assembling', 'merging',
]);

// 6-stage pipeline (Tachi mockup uses 6, our backend has more granular states
// but most map naturally onto these). Used by Processing view's stage chain.
const STAGES = [
  { id: 'import',     label: 'Import',     hint: 'Acquire & prep media' },
  { id: 'analyze',    label: 'Analyze',    hint: 'Transcribe & diarize' },
  { id: 'translate',  label: 'Translate',  hint: 'Render copy' },
  { id: 'review',     label: 'Review',     hint: 'Wizard pause' },

];

// Server status → which stage is currently active (returns index 0-5).
// Returns -1 if status doesn't map to a stage (idle/done/error).
const stageForStatus = (status) => {
  switch (status) {
    case 'queued': case 'scheduled': case 'downloading': case 'extracting': case 'resuming':
      return 0;
    case 'transcribing': case 'diarizing': case 'awaiting_transcript_review':
      return 1;
    case 'translating':
      return 2;
    case 'awaiting_translation_review':
      return 3;
    case 'synthesizing':
      return 4;
    case 'assembling': case 'merging':
      return 5;
    case 'complete':
      return 6;
    default:
      return -1;
  }
};

// Map server status → unified UI status meta
const STATUS_META = {
  complete:                       { color: 'var(--accent)', label: 'Completed' },
  awaiting_translation_review:    { color: 'var(--warn)',   label: 'Awaiting review' },
  error:                          { color: 'var(--err)',    label: 'Error' },
  cancelled:                      { color: 'var(--ink-4)',  label: 'Cancelled' },
  queued:                         { color: 'var(--ink-3)',  label: 'Queued' },
  scheduled:                      { color: '#8a9aff',       label: 'Scheduled' },
  awaiting_transcript_review:     { color: 'var(--warn)',   label: 'Awaiting transcript review' },
  // Active states all show Running
  running:                        { color: 'var(--accent)', label: 'Running' },
  downloading:                    { color: 'var(--accent)', label: 'Downloading' },
  extracting:                     { color: 'var(--accent)', label: 'Extracting' },
  resuming:                       { color: 'var(--accent)', label: 'Resuming' },
  transcribing:                   { color: 'var(--accent)', label: 'Transcribing' },
  diarizing:                      { color: 'var(--accent)', label: 'Diarizing' },
  translating:                    { color: 'var(--accent)', label: 'Translating' },
  synthesizing:                   { color: 'var(--accent)', label: 'Synthesizing' },
  assembling:                     { color: 'var(--accent)', label: 'Assembling' },
  merging:                        { color: 'var(--accent)', label: 'Merging' },
};

// Format helpers
const fmtSec = (s) => {
  if (!s && s !== 0) return '—';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
};

// Relative-time formatter, "2h ago" / "3d ago" / "just now". Server gives
// `created` as a unix-seconds timestamp.
const fmtAge = (ts) => {
  if (!ts) return '';
  const now = Date.now() / 1000;
  const d = now - ts;
  if (d < 60) return 'just now';
  if (d < 3600) return Math.floor(d / 60) + 'm ago';
  if (d < 86400) return Math.floor(d / 3600) + 'h ago';
  if (d < 7 * 86400) return Math.floor(d / 86400) + 'd ago';
  const dt = new Date(ts * 1000);
  return dt.toLocaleDateString();
};

// localStorage helpers (preserved from current app — same key prefix
// so users don't lose their saved preferences on upgrade)
const _lsGet = (key, fallback) => {
  try {
    const v = localStorage.getItem('tachidubb_pref_' + key);
    if (v === null) return fallback;
    if (v === 'true') return true;
    if (v === 'false') return false;
    return v;
  } catch (_) { return fallback; }
};
const _lsSet = (key, v) => {
  try { localStorage.setItem('tachidubb_pref_' + key, String(v)); } catch (_) {}
};

  link:       <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M6 4H4.5A2.5 2.5 0 1 0 4.5 11H6M10 11h1.5A2.5 2.5 0 1 0 11.5 6H10M5.5 7.5h5"/></svg>,

// ═══════════════════════════════════════════════════════════════════
// SPHERE — Tachi signature. Lightweight icosahedron with rim glow.
// Mounted only on Home + Processing per scoping survey decision.
// ═══════════════════════════════════════════════════════════════════
function mountSphere(el, opts) {
  const { variant = 'idle', size = 220 } = opts || {};
  if (!el || typeof THREE === 'undefined') {
    el.innerHTML = `<div style="width:${size}px;height:${size}px;border-radius:50%;
      border:1px solid var(--line-2);background:radial-gradient(circle at 30% 30%,
      var(--bg-2),var(--bg) 70%);"></div>`;
    return () => { el.innerHTML = ''; };
  }
  const palette = variant === 'live'
    ? { core: 0xccff66, rim: 0x88dd44, breath: 1.6 }
    : { core: 0x9ab4d4, rim: 0x5a7094, breath: 3.2 };

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
  camera.position.set(0, 0, 5.2);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  renderer.setSize(size, size);
  el.appendChild(renderer.domElement);

  const geo = new THREE.IcosahedronGeometry(1.4, 3);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uCore: { value: new THREE.Color(palette.core) }, uRim: { value: new THREE.Color(palette.rim) } },
    vertexShader: `
      varying vec3 vNormal; varying vec3 vPos;
      uniform float uTime;
      float noise(vec3 p) {
        return sin(p.x*2.0+uTime*0.7)*0.5 + cos(p.y*1.7+uTime*0.5)*0.5 + sin(p.z*2.3+uTime*0.6)*0.3;
      }
      void main() {
        vNormal = normal; vPos = position;
        float n = noise(position*0.8) * 0.12;
        vec3 d = position + normal * n;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(d, 1.0);
      }`,
    fragmentShader: `
      varying vec3 vNormal; varying vec3 vPos;
      uniform vec3 uCore; uniform vec3 uRim; uniform float uTime;
      void main() {
        vec3 view = normalize(cameraPosition - vPos);
        float rim = pow(1.0 - max(dot(vNormal, view), 0.0), 2.2);
        float pulse = 0.5 + 0.5 * sin(uTime * 0.5);
        vec3 col = mix(uCore * 0.25, uRim, rim);
        col *= 0.8 + pulse * 0.3;
        gl_FragColor = vec4(col, 0.95);
      }`,
    transparent: true, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  const halo = new THREE.Mesh(
    new THREE.IcosahedronGeometry(1.7, 2),
    new THREE.MeshBasicMaterial({ color: palette.rim, wireframe: true, transparent: true, opacity: variant === 'live' ? 0.35 : 0.18 })
  );
  scene.add(halo);

  let t0 = performance.now(); let raf;
  const tick = () => {
    const t = (performance.now() - t0) * 0.001;
    mat.uniforms.uTime.value = t * palette.breath;
    mesh.rotation.y = t * 0.12; mesh.rotation.x = Math.sin(t * 0.2) * 0.08;
    halo.rotation.y = -t * 0.06;
    renderer.render(scene, camera);
    raf = requestAnimationFrame(tick);
  };
  raf = requestAnimationFrame(tick);
  return () => {
    cancelAnimationFrame(raf);
    renderer.dispose(); geo.dispose(); mat.dispose();
    halo.geometry.dispose(); halo.material.dispose();
    if (renderer.domElement.parentNode === el) el.removeChild(renderer.domElement);
  };
}

// SHARED WIDGETS (designer's set, condensed)

function Toggle({ value, onChange, label, hint, disabled = false }) {

function StatusBadge({ status }) {

// Slim horizontal progress bar — used in headers, footers, anywhere a
// 0-100% needs to be shown without taking vertical space.
function LongProgress({ value, color = 'var(--accent)', height = 3 }) {
  const v = Math.max(0, Math.min(1, value || 0));
  return (
    <div style={{ height, background: 'var(--bg-3)', borderRadius: height / 2, overflow: 'hidden' }}>
      <div style={{
        height: '100%', width: (v * 100).toFixed(1) + '%', background: color,
        transition: 'width 0.4s', borderRadius: height / 2,
      }}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// PROCESSING VIEW — live job progress with stage chain + log tail
// Polls /api/jobs (parent does that) and shows real-time stage/progress.
// Cancel button POSTs to /api/dub/{id}/cancel.
// ═══════════════════════════════════════════════════════════════════
function ProcessingView({ runningJob, sphereOn, onJobCancelled, onSwitchToHome }) {
  // logTail keeps last N step_detail strings as they change. Server doesn't
  // expose a true log endpoint, but watching `step_detail` mutations gives
  // the user "something is happening" feedback that's faithful to actual progress.
  const [logTail, setLogTail] = useState([]);
  const lastDetailRef = useRef(null);
  const [cancelling, setCancelling] = useState(false);

  // Capture step_detail changes into logTail
  useEffect(() => {
    if (!runningJob) return;
    const detail = runningJob.step_detail;
    if (detail && detail !== lastDetailRef.current) {
      const ts = new Date().toTimeString().slice(0, 8);
      const status = runningJob.status || '';
      setLogTail(prev => [...prev.slice(-15), { ts, status, detail }]);
      lastDetailRef.current = detail;
    }
  }, [runningJob?.step_detail, runningJob?.status]);

  // Reset log tail when we switch to a different job
  useEffect(() => {
    setLogTail([]);
    lastDetailRef.current = null;
  }, [runningJob?.id]);

  const cancel = async () => {
    if (!runningJob || cancelling) return;
    if (!confirm('Cancel this job? In-progress work will be discarded.')) return;
    setCancelling(true);
    try {
      await fetch(`/api/dub/${runningJob.id}/cancel`, { method: 'POST' });
      // Don't navigate immediately — let the next /api/jobs poll show
      // status=cancelled, then user sees the result.
      setTimeout(() => onJobCancelled(), 600);
    } catch (e) {
      alert('Cancel failed: ' + e);
    } finally {
      setCancelling(false);
    }
  };

  // No active job — empty state
  if (!runningJob) {
    return <ProcessingEmpty onSwitchToHome={onSwitchToHome}/>;
  }

  const progress = (runningJob.progress || 0) / 100;
  const stageIdx = stageForStatus(runningJob.status);
  const startedAt = runningJob.started_at || runningJob.created;
  const elapsedSec = startedAt ? Math.floor(Date.now() / 1000 - startedAt) : 0;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: 'var(--bg)' }}>

      {/* Hero — sphere + headline + big progress */}
      <div style={{
        padding: '32px 40px 28px',
        borderBottom: '1px solid var(--line)',
        display: 'flex', alignItems: 'center', gap: 32,
      }}>
        {sphereOn && <ProcessingSphere/>}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="caps" style={{ marginBottom: 8 }}>
            <span style={{ color: 'var(--accent)' }}>● Live</span>
            <span style={{ marginLeft: 10, color: 'var(--ink-4)' }}>job {runningJob.id?.slice(0, 8)}</span>
          </div>
          <div className="serif" style={{
            fontSize: 28, lineHeight: 1.1, letterSpacing: '-0.01em', marginBottom: 6,
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>
            {runningJob.source_label || runningJob.source || runningJob.id}
          </div>
          <div style={{ fontSize: 12.5, color: 'var(--ink-3)', display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            <StatusBadge status={runningJob.status}/>
            <span style={{ color: 'var(--ink-4)' }}>·</span>
            <span>{runningJob.target_lang ? '→ ' + runningJob.target_lang : ''}</span>
            {runningJob.model && <><span style={{ color: 'var(--ink-4)' }}>·</span><span className="mono">{runningJob.model}</span></>}
            {runningJob.duration && <><span style={{ color: 'var(--ink-4)' }}>·</span><span className="mono">{fmtSec(runningJob.duration)}</span></>}
          </div>

          {/* Big percentage + ETA */}
          <div style={{ marginTop: 18 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 8 }}>
              <span className="serif" style={{ fontSize: 36, fontVariantNumeric: 'tabular-nums', color: 'var(--ink)' }}>
                {(progress * 100).toFixed(0)}<span style={{ fontSize: 18, color: 'var(--ink-3)' }}>%</span>
              </span>
              <span style={{ fontSize: 13, color: 'var(--ink-2)', minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                {runningJob.step_detail || '—'}
              </span>
              <div style={{ flex: 1 }}/>
              <span className="mono" style={{ fontSize: 11, color: 'var(--ink-3)', flexShrink: 0 }}>
                running for {Math.floor(elapsedSec / 60)}m {elapsedSec % 60}s
              </span>
            </div>
            <LongProgress value={progress} color="var(--ink-2)" height={4}/>
          </div>
        </div>
      </div>

      {/* Body — stages chain | logs */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>

        {/* Stages chain */}
        <div style={{ flex: 1, padding: '28px 40px', overflow: 'auto' }}>
          <div className="caps" style={{ marginBottom: 16 }}>Pipeline</div>
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            {STAGES.map((s, i) => (
              <StageRow
                key={s.id}
                stage={s}
                idx={i}
                state={i < stageIdx ? 'done' : i === stageIdx ? 'running' : 'pending'}
                stepDetail={i === stageIdx ? runningJob.step_detail : null}
                isLast={i === STAGES.length - 1}
              />
            ))}
          </div>

          {/* Error banner */}
          {runningJob.status === 'error' && runningJob.error && (
            <div style={{
              marginTop: 24, padding: '14px 16px',
              background: 'oklch(0.7 0.2 25 / 0.08)', border: '1px solid oklch(0.7 0.2 25 / 0.3)',
              borderRadius: 8,
            }}>
              <div className="caps" style={{ color: 'var(--err)', marginBottom: 6 }}>Error</div>
              <div className="mono" style={{ fontSize: 11.5, color: 'var(--ink-2)', lineHeight: 1.5 }}>
                {runningJob.error}
              </div>
            </div>
          )}
        </div>

        {/* Log tail */}
        <div style={{
          width: 380, borderLeft: '1px solid var(--line)',
          display: 'flex', flexDirection: 'column',
        }}>
          <div style={{
            padding: '14px 16px', borderBottom: '1px solid var(--line)',
            display: 'flex', alignItems: 'center',
          }}>
            <div className="caps">Activity</div>
            <div style={{ flex: 1 }}/>
            <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>
              {logTail.length} updates
            </span>
          </div>
          <div className="scroll" style={{
            flex: 1, padding: '12px 16px',
            fontFamily: 'var(--mono)', fontSize: 11, lineHeight: 1.7,
          }}>
            {logTail.length === 0 ? (
              <div style={{ color: 'var(--ink-4)', fontStyle: 'italic' }}>
                Waiting for first update…
              </div>
            ) : logTail.map((line, i) => (
              <div key={i} style={{ color: i === logTail.length - 1 ? 'var(--ink-2)' : 'var(--ink-3)' }}>
                <span style={{ color: 'var(--ink-4)' }}>[{line.ts}]</span>{' '}
                <span style={{ color: 'var(--accent)' }}>{line.status}</span>{' '}
                {line.detail}
              </div>
            ))}
            {ACTIVE_STATUSES.has(runningJob.status) && (
              <span style={{
                display: 'inline-block', width: 6, height: 11,
                background: 'var(--accent)', verticalAlign: 'text-bottom',
                animation: 'pulse 1s infinite',
              }}/>
            )}
          </div>
          <div style={{ padding: 14, borderTop: '1px solid var(--line)', display: 'flex', gap: 8 }}>
            <button
              onClick={() => navigator.clipboard?.writeText(logTail.map(l => `[${l.ts}] ${l.status} ${l.detail}`).join('\n'))}
              className="btn" style={{ flex: 1, justifyContent: 'center' }}>
              {I.copy} Copy log
            </button>
            <button
              onClick={cancel}
              disabled={cancelling || !ACTIVE_STATUSES.has(runningJob.status)}
              className="btn"
              style={{
                flex: 1, justifyContent: 'center',
                color: 'var(--err)', borderColor: 'oklch(0.7 0.2 25 / 0.4)',
              }}>
              {I.cancel} {cancelling ? 'Cancelling…' : 'Cancel'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ProcessingEmpty({ onSwitchToHome }) {
  return (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16, padding: 40, background: 'var(--bg)' }}>
      <div className="caps">No active job</div>
      <div className="serif" style={{ fontSize: 32, letterSpacing: '-0.015em', textAlign: 'center', maxWidth: 480 }}>

      </div>
      <div style={{ fontSize: 13, color: 'var(--ink-3)', textAlign: 'center', maxWidth: 360, lineHeight: 1.5 }}>
        When you start a dub it'll show up here with live stage progress, log tail, and a cancel button.
      </div>
      <button onClick={onSwitchToHome} className="btn btn-primary" style={{ marginTop: 8 }}>
        {I.arrow} Start a new dub
      </button>
    </div>

}

function ProcessingSphere() {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    return mountSphere(ref.current, { variant: 'live', size: 180 });
  }, []);
  return <div ref={ref} style={{ width: 180, height: 180, flexShrink: 0, pointerEvents: 'none' }}/>;
}

function StageRow({ stage, idx, state, stepDetail, isLast }) {
  const isDone = state === 'done';
  const isRun = state === 'running';
  return (
    <div style={{
      display: 'flex', alignItems: 'flex-start', gap: 16,
      padding: '14px 0',
      borderBottom: isLast ? 'none' : '1px solid var(--line)',
      opacity: state === 'pending' ? 0.55 : 1,
    }}>
      <div style={{
        width: 28, height: 28, borderRadius: '50%',
        background: isDone ? 'var(--accent)' : 'transparent',
        border: '1.5px solid ' + (isDone ? 'var(--accent)' : isRun ? 'var(--accent)' : 'var(--line-2)'),
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: isDone ? '#0a0a0d' : isRun ? 'var(--accent)' : 'var(--ink-4)',
        boxShadow: isRun ? '0 0 12px var(--accent-glow)' : 'none',
        flexShrink: 0,
      }}>
        {isDone ? I.check : <span className="mono" style={{ fontSize: 10, fontWeight: 600 }}>{(idx + 1).toString().padStart(2, '0')}</span>}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12 }}>
          <div className="serif" style={{ fontSize: 18 }}>{stage.label}</div>
          <div style={{ fontSize: 12, color: 'var(--ink-3)' }}>{stage.hint}</div>
          <div style={{ flex: 1 }}/>
          {isRun && <div className="mono" style={{ fontSize: 11, color: 'var(--accent)', animation: 'pulse 1.4s infinite' }}>active</div>}
          {isDone && <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>done</div>}
        </div>
        {isRun && stepDetail && (
          <div style={{
            marginTop: 8, padding: '8px 10px',
            background: 'var(--bg-1)', border: '1px solid var(--line)',
            borderRadius: 5, fontSize: 11.5, color: 'var(--ink-2)',
          }}>{stepDetail}</div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// HISTORY VIEW — table of all jobs with filter/search/star + actions.
// Jobs come from parent App's poll.
// ═══════════════════════════════════════════════════════════════════
function HistoryView({ jobs, onJumpProcessing, onJumpReview, onJumpResult, onRefresh }) {
  const [q, setQ] = useState('');
  const [filter, setFilter] = useState('all');
  const [starOnly, setStarOnly] = useState(false);

  const filtered = useMemo(() => {
    return jobs.filter(j => {
      if (starOnly && !j.starred) return false;
      if (filter === 'all') {
        // ok
      } else if (filter === 'active') {
        if (!ACTIVE_STATUSES.has(j.status)) return false;
      } else if (filter === 'review') {
        if (j.status !== 'awaiting_translation_review' && j.status !== 'awaiting_transcript_review') return false;
      } else if (j.status !== filter) {
        return false;
      }
      if (q) {
        const hay = (j.source_label || j.source || j.id || '').toLowerCase();
        if (!hay.includes(q.toLowerCase())) return false;
      }
      return true;
    });
  }, [jobs, q, filter, starOnly]);

  const counts = useMemo(() => {
    const c = { all: jobs.length, active: 0, review: 0, complete: 0, error: 0 };
    for (const j of jobs) {
      if (ACTIVE_STATUSES.has(j.status)) c.active++;
      if (j.status === 'awaiting_translation_review' || j.status === 'awaiting_transcript_review') c.review++;
      if (j.status === 'complete') c.complete++;
      if (j.status === 'error' || j.status === 'cancelled') c.error++;
    }
    return c;
  }, [jobs]);

  return (
    <div style={{ flex: 1, overflow: 'auto', background: 'var(--bg)' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '36px 36px 80px' }}>

        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 26, gap: 20 }}>
          <div>
            <div className="caps">History</div>
            <div className="serif" style={{ fontSize: 36, lineHeight: 1.05, letterSpacing: '-0.015em', marginTop: 4 }}>
              Every run, <span style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>kept</span>.
            </div>
            <div style={{ color: 'var(--ink-3)', marginTop: 6, fontSize: 13, maxWidth: 520 }}>
              Starred jobs are protected from storage cleanup. Click a row's actions to view, resume, or open its folder.
            </div>
          </div>
          <button onClick={onRefresh} className="btn">
            {I.refresh} Refresh
          </button>
        </div>

        {/* Filters */}
        <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginBottom: 16, flexWrap: 'wrap' }}>
          <div style={{ position: 'relative', flex: 1, maxWidth: 340 }}>
            <div style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--ink-3)' }}>
              {I.search}
            </div>
            <input
              className="field"
              placeholder="Search by title, URL, ID…"
              value={q}
              onChange={e => setQ(e.target.value)}
              style={{ paddingLeft: 32 }}
            />
          </div>

          <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
            {[
              ['all',      'All',        counts.all],
              ['active',   'Active',     counts.active],
              ['review',   'In review',  counts.review],
              ['complete', 'Complete',   counts.complete],
              ['error',    'Error',      counts.error],
            ].map(([id, label, count]) => (
              <button key={id} onClick={() => setFilter(id)} className="btn" style={{
                padding: '5px 10px', fontSize: 11,
                borderColor: filter === id ? 'var(--accent)' : 'var(--line)',
                background: filter === id ? 'var(--accent-dim)' : 'var(--bg-1)',
                color: filter === id ? 'var(--accent)' : 'var(--ink-2)',
              }}>
                {label} {count > 0 && <span className="mono" style={{ marginLeft: 4, opacity: 0.6, fontSize: 10 }}>{count}</span>}
              </button>
            ))}
          </div>

          <div style={{ flex: 1 }}/>

          <button onClick={() => setStarOnly(!starOnly)} className="btn" style={{
            padding: '5px 10px', fontSize: 11,
            borderColor: starOnly ? '#e6c454' : 'var(--line)',
            color: starOnly ? '#e6c454' : 'var(--ink-2)',
          }}>
            {starOnly ? I.star : I.starOff}
            Starred only
          </button>
        </div>

        {/* Table */}
        <div style={{ border: '1px solid var(--line)', borderRadius: 10, overflow: 'hidden', background: 'var(--bg-1)' }}>
          <div style={{
            display: 'grid',
            gridTemplateColumns: '30px 2.4fr 1fr 0.9fr 0.9fr 200px',
            padding: '10px 16px',
            borderBottom: '1px solid var(--line)',
            background: 'var(--bg-2)', gap: 12,
          }}>
            {['', 'Title', 'Status', 'Duration', 'Age', ''].map((h, i) => (
              <div key={i} className="caps">{h}</div>
            ))}
          </div>
          {filtered.length === 0 ? (
            <div style={{ padding: '64px 20px', textAlign: 'center', color: 'var(--ink-3)', fontSize: 12 }}>
              {jobs.length === 0
                ? <>No jobs yet. <span style={{ color: 'var(--ink-4)' }}>Start your first dub from Home →</span></>
                : <>No jobs match the filter. <button className="btn" style={{ marginLeft: 8 }} onClick={() => { setQ(''); setFilter('all'); setStarOnly(false); }}>Reset</button></>
              }
            </div>
          ) : filtered.map(job => (
            <JobRow
              key={job.id}
              job={job}
              onJumpProcessing={onJumpProcessing}
              onJumpReview={onJumpReview}
              onJumpResult={onJumpResult}
              onRefresh={onRefresh}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

function JobRow({ job, onJumpProcessing, onJumpReview, onJumpResult, onRefresh }) {
  const [busy, setBusy] = useState(false);
  const [redubOpen, setRedubOpen] = useState(false);

  const star = async () => {
    setBusy(true);
    try {
      const fd = new FormData();
      fd.append('starred', job.starred ? 'false' : 'true');
      await fetch(`/api/storage/star/${job.id}`, { method: 'POST', body: fd });
      onRefresh();
    } finally { setBusy(false); }
  };

  const cancel = async () => {
    if (!confirm('Cancel this job?')) return;
    setBusy(true);
    try {
      await fetch(`/api/dub/${job.id}/cancel`, { method: 'POST' });
      onRefresh();
    } finally { setBusy(false); }
  };

  const resume = async () => {
    setBusy(true);
    try {
      // Continue from latest checkpoint
      const fd = new FormData();
      const r = await fetch(`/api/dub/${job.id}/continue`, { method: 'POST', body: fd });
      if (r.ok) {
        onRefresh();
        onJumpProcessing();
      } else {
        alert('Resume failed');
      }
    } finally { setBusy(false); }
  };

  const remove = async () => {
    if (!confirm('Delete this job and its files?')) return;
    setBusy(true);
    try {
      await fetch(`/api/job/${job.id}`, { method: 'DELETE' });
      onRefresh();
    } finally { setBusy(false); }
  };

  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '30px 2.4fr 1fr 0.9fr 0.9fr 200px',
      padding: '12px 16px',
      borderBottom: '1px solid var(--line)',
      alignItems: 'center', gap: 12,
      transition: 'background 0.12s',
    }}
    onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-2)'}
    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
    >
      <button className="btn-ghost" disabled={busy}
        style={{ padding: 4, color: job.starred ? '#e6c454' : 'var(--ink-4)' }}
        onClick={star}
        title={job.starred ? 'Unstar' : 'Star (protect from cleanup)'}
      >
        {job.starred ? I.star : I.starOff}
      </button>

      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--ink)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
          {job.source_label || job.source || job.id}
        </div>
        <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 2, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          <span>{job.id?.slice(0, 8)}</span>
          {job.target_lang && <span>· → {job.target_lang}</span>}
          {job.model && <span>· {job.model}</span>}
          {job.batch_label && <span style={{ color: 'var(--accent)' }}>· {job.batch_label}</span>}
        </div>
        {job.error && (
          <div className="mono" style={{ fontSize: 10, color: 'var(--err)', marginTop: 3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {I.cancel} {job.error}
          </div>
        )}
      </div>

      <div>
        <StatusBadge status={job.status}/>
        {ACTIVE_STATUSES.has(job.status) && (
          <div style={{ marginTop: 5, width: 110 }}>
            <LongProgress value={(job.progress || 0) / 100} color="var(--accent)" height={2}/>
          </div>
        )}
      </div>

      <div className="mono" style={{ fontSize: 11, color: 'var(--ink-2)' }}>
        {job.duration ? fmtSec(job.duration) : '—'}
      </div>

      <div className="mono" style={{ fontSize: 11, color: 'var(--ink-3)' }}>
        {fmtAge(job.created)}
      </div>

      <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end' }}>
        <RowActions
          job={job} busy={busy}
          onView={() => onJumpResult(job.id)}
          onWatch={() => onJumpProcessing()}
          onReview={() => onJumpReview(job.id)}
          onResume={resume}
          onCancel={cancel}
          onRemove={remove}
          onRedub={() => setRedubOpen(true)}
        />
      </div>
      {redubOpen && (
        <RedubModal
          job={job}
          onClose={() => setRedubOpen(false)}
          onSubmitted={() => { setRedubOpen(false); onRefresh(); }}
        />
      )}
    </div>
  );
}

// ── Re-dub modal — pick new languages + mode, reuses original source ──
function RedubModal({ job, onClose, onSubmitted }) {
  const pickable = LANGS.filter(l => l.c !== 'auto' && l.c !== job.target_lang);
  const [picked, setPicked] = useState(['fr', 'de']);
  const [mode, setMode] = useState('compare');      // 'single' | 'compare' | 'showcase'
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  const toggle = (c) => {
    if (picked.includes(c)) {
      if (mode === 'single' || picked.length > 1) setPicked(picked.filter(x => x !== c));
    } else {
      if (mode === 'single') setPicked([c]);
      else if (picked.length < 6) setPicked([...picked, c]);
    }
  };

  // Constrain picked count when mode changes
  useEffect(() => {
    if (mode === 'single' && picked.length > 1) setPicked([picked[0]]);
    if (mode !== 'single' && picked.length < 2) setPicked([...picked, 'de'].slice(0, 2));
  }, [mode]);

  const canSubmit = !busy && (
    (mode === 'single' && picked.length === 1) ||
    (mode !== 'single' && picked.length >= 2 && picked.length <= 6)
  );

  const submit = async () => {
    setError(null); setBusy(true);
    try {
      const fd = new FormData();
      fd.append('target_langs', picked.join(','));
      fd.append('mode', mode);
      const r = await fetch(`/api/job/${job.id}/redub`, { method: 'POST', body: fd });
      const d = await r.json();
      if (d.ok) onSubmitted();
      else setError(d.error || 'Re-dub failed');
    } catch (e) {
      setError(String(e.message || e));
    } finally {
      setBusy(false);
    }
  };

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)',
      zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        width: 'min(560px, 92vw)', background: 'var(--bg-1)',
        border: '1px solid var(--line)', borderRadius: 10, padding: 22,
      }}>
        <div className="caps" style={{ marginBottom: 6 }}>Re-dub from history</div>
        <div className="serif" style={{ fontSize: 20, marginBottom: 4 }}>
          {job.source_label || job.id}
        </div>
        <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginBottom: 18 }}>
          original → {job.target_lang?.toUpperCase()} · {job.model || '—'}
        </div>

        {/* Mode toggle */}
        <div className="caps" style={{ marginBottom: 8 }}>Mode</div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 18 }}>
          {[
            { id: 'single',   t: 'Single', d: 'One new dub' },
            { id: 'compare',  t: 'Compare', d: 'N separate dubs (2–6)' },
            { id: 'showcase', t: 'Showcase', d: 'Stitched reel' },
          ].map(o => (
            <button key={o.id}
              className={'btn ' + (mode === o.id ? 'btn-primary' : '')}
              onClick={() => setMode(o.id)}
              style={{ flex: 1, padding: '8px 6px', flexDirection: 'column', alignItems: 'center', display: 'flex', gap: 2 }}>
              <div style={{ fontSize: 12 }}>{o.t}</div>
              <div style={{ fontSize: 9.5, color: mode === o.id ? 'inherit' : 'var(--ink-4)' }}>{o.d}</div>
            </button>
          ))}
        </div>

        {/* Language chips */}
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 8 }}>
          <div className="caps">Target languages · {picked.length} {mode === 'single' ? '' : 'of 2–6'}</div>
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 16 }}>
          {pickable.map(l => {
            const on = picked.includes(l.c);
            const disabled = !on && mode !== 'single' && picked.length >= 6;
            return (
              <button key={l.c} onClick={() => toggle(l.c)} disabled={disabled}
                style={{
                  padding: '6px 10px', borderRadius: 4,
                  background: on ? 'var(--accent)' : 'var(--bg)',
                  color: on ? '#0a0a0d' : 'var(--ink-2)',
                  border: '1px solid ' + (on ? 'var(--accent)' : 'var(--line)'),
                  fontSize: 11.5, cursor: disabled ? 'not-allowed' : 'pointer',
                  opacity: disabled ? 0.4 : 1,
                }}>
                {l.n}
              </button>
            );
          })}
        </div>

        <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginBottom: 16, lineHeight: 1.6 }}>
          Settings inherited from the original (voice preset, model, whisper, TTS speed, etc).
          Source video is reused — no re-upload.
        </div>

        {error && (
          <div className="mono" style={{ fontSize: 11, color: 'var(--err)', marginBottom: 12 }}>{error}</div>
        )}

        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
          <button className="btn" onClick={onClose} disabled={busy}>Cancel</button>
          <button className="btn btn-primary" onClick={submit} disabled={!canSubmit}>
            {busy ? 'Queuing…' :
              mode === 'single' ? `Re-dub in ${picked[0]?.toUpperCase() || '?'}` :
              mode === 'showcase' ? `Build showcase · ${picked.length} langs` :
              `Queue ${picked.length} dubs`}
          </button>
        </div>
      </div>
    </div>
  );
}

function RowActions({ job, busy, onView, onWatch, onReview, onResume, onCancel, onRemove, onRedub }) {
  if (job.status === 'complete') {
    return (
      <>
        <button className="btn" disabled={busy} onClick={onView} style={{ padding: '4px 10px', fontSize: 11 }}>
          {I.eye} View
        </button>
        <button className="btn-ghost" disabled={busy} onClick={onRedub}
                style={{ padding: '4px 8px', fontSize: 11, color: 'var(--ink-3)' }}
                title="Re-dub the same source in new languages">
          ↻ Re-dub
        </button>
      </>
    );
  }
  if (job.status === 'awaiting_translation_review' || job.status === 'awaiting_transcript_review') {
    return (
      <button className="btn btn-primary" disabled={busy} onClick={onReview} style={{ padding: '4px 10px', fontSize: 11 }}>
        {I.edit} Review
      </button>
    );
  }
  if (job.status === 'error' || job.status === 'cancelled') {
    return (
      <>
        {job.has_checkpoint && (
          <button className="btn" disabled={busy} onClick={onResume} style={{ padding: '4px 10px', fontSize: 11 }}>
            {I.refresh} Resume
          </button>
        )}
        <button className="btn-ghost" disabled={busy} onClick={onRemove} style={{ padding: 4, color: 'var(--err)' }} title="Delete">
          {I.trash}
        </button>
      </>
    );
  }
  if (ACTIVE_STATUSES.has(job.status)) {
    return (
      <>
        <button className="btn" disabled={busy} onClick={onWatch} style={{ padding: '4px 10px', fontSize: 11 }}>
          {I.eye} Watch
        </button>
        <button className="btn-ghost" disabled={busy} onClick={onCancel} style={{ padding: 4, color: 'var(--err)' }} title="Cancel">
          {I.cancel}
        </button>
      </>
    );
  }
  if (job.status === 'scheduled' || job.status === 'queued') {
    return (
      <button className="btn-ghost" disabled={busy} onClick={onCancel} style={{ padding: 4, color: 'var(--err)' }} title="Cancel before start">
        {I.cancel}
      </button>
    );
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════
// RESULT VIEW — completed dub. Export hero (preset cards), video, panels.
// Real wiring:
//   - Player srces /outputs/{id}/dubbed_video.mp4
//   - Burn subs panel preview/render hits subs_preview / burn_subs
//   - Lip-sync panel hits /api/lip_sync/status + /api/dub/{id}/lip_sync
//   - Regenerate panel hits /api/dub/{id}/retry_tts
//   - Export-for-platform: hits /api/dub/{id}/export with preset form param
// ═══════════════════════════════════════════════════════════════════
function ResultView({ jobs, selectedJobId, voicePresets, onPickJob, onSwitchToHome, onSwitchToHistory }) {
  // Pick the job: explicit selection > most recent complete
  const completedJobs = useMemo(
    () => jobs.filter(j => j.status === 'complete').sort((a, b) => (b.completed_at || b.created || 0) - (a.completed_at || a.created || 0)),
    [jobs]
  );
  const job = useMemo(() => {
    if (selectedJobId) return jobs.find(j => j.id === selectedJobId);
    return completedJobs[0];
  }, [jobs, selectedJobId, completedJobs]);

  // Empty state
  if (!job) {
    return (
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16, padding: 40, background: 'var(--bg)' }}>
        <div className="caps">No completed jobs yet</div>
        <div className="serif" style={{ fontSize: 32, letterSpacing: '-0.015em', textAlign: 'center', maxWidth: 480 }}>
          Nothing to <span style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>show off</span> yet.
        </div>
        <div style={{ fontSize: 13, color: 'var(--ink-3)', textAlign: 'center', maxWidth: 360, lineHeight: 1.5 }}>
          When a dub finishes, this view shows the video, downloads, export presets, and per-segment controls.
        </div>
        <button onClick={onSwitchToHome} className="btn btn-primary" style={{ marginTop: 8 }}>
          {I.arrow} Start your first dub
        </button>
      </div>
    );
  }

  return <ResultViewInner job={job} jobs={completedJobs} voicePresets={voicePresets} onPickJob={onPickJob} onSwitchToHistory={onSwitchToHistory}/>;
}

function ResultViewInner({ job, jobs, voicePresets, onPickJob, onSwitchToHistory }) {
  // Cache-bust the video URL so an updated dub (after regenerate / lip-sync /
  // burn subs) reflects immediately instead of showing a stale browser cache.
  const [videoVersion, setVideoVersion] = useState(0);
  const [videoOverrideUrl, setVideoOverrideUrl] = useState(null); // for lip-sync / burn-subs swap

  const videoUrl = useMemo(() => {
    const base = videoOverrideUrl || `/outputs/${job.id}/dubbed_video.mp4`;
    const sep = base.includes('?') ? '&' : '?';
    return base + sep + 'v=' + videoVersion + '_' + (job.completed_at || 0);
  }, [job.id, job.completed_at, videoOverrideUrl, videoVersion]);

  // Panel open/close
  const [open, setOpen] = useState({ export: false, subs: false, lipsync: false, regen: false });
  const toggle = (k) => setOpen(o => ({ ...o, [k]: !o[k] }));

  return (
    <div style={{ flex: 1, overflow: 'auto', background: 'var(--bg)' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', padding: '36px 36px 80px' }}>

        {/* Hero — title, meta, job switcher */}
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 24, marginBottom: 28 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="caps" style={{ marginBottom: 8 }}>
              <span style={{ color: 'var(--accent)' }}>● Completed</span>
              <span style={{ marginLeft: 10, color: 'var(--ink-4)' }}>
                {job.id?.slice(0, 8)} · {fmtAge(job.completed_at || job.created)}
              </span>
            </div>
            <div className="serif" style={{ fontSize: 32, lineHeight: 1.05, letterSpacing: '-0.015em', marginBottom: 10 }}>
              {job.source_label || job.source || job.id}
            </div>
            <div style={{ fontSize: 12.5, color: 'var(--ink-3)', display: 'flex', gap: 12, flexWrap: 'wrap' }}>
              {job.target_lang && <span>→ {job.target_lang}</span>}
              {job.duration && <><span style={{ color: 'var(--ink-4)' }}>·</span><span className="mono">{fmtSec(job.duration)}</span></>}
              {job.model && <><span style={{ color: 'var(--ink-4)' }}>·</span><span className="mono">{job.model}</span></>}
              {job.speaker_mode && <><span style={{ color: 'var(--ink-4)' }}>·</span><span>{job.speaker_mode === 'main' ? 'main speaker' : 'all speakers'}</span></>}
            </div>
          </div>

          {/* Switcher: pick another completed job */}
          {jobs.length > 1 && (
            <div style={{ flexShrink: 0 }}>
              <Select value={job.id} onChange={onPickJob}>
                {jobs.slice(0, 20).map(j => (
                  <option key={j.id} value={j.id} style={{ background: '#16161c' }}>

          )}
        </div>

        {/* ─────────────────────────────────────────────────── */}
        {/* EXPORT FOR PLATFORM — preset cards FIRST per scoping */}
        {/* ─────────────────────────────────────────────────── */}
        <ExportPanel job={job}/>

        {/* ─────────────────────────────────────────────────── */}
        {/* VIDEO PLAYER + downloads                              */}
        {/* ─────────────────────────────────────────────────── */}
        <div style={{ marginTop: 32, marginBottom: 18 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
            <div className="caps">Dubbed video</div>
            <div style={{ flex: 1 }}/>
            <a href={videoUrl} download={`dubbed_${job.id?.slice(0, 8)}.mp4`} className="btn">
              {I.arrow} Download MP4
            </a>
          </div>
          <div style={{
            background: '#000', border: '1px solid var(--line)', borderRadius: 8,
            overflow: 'hidden', position: 'relative',
          }}>
            <video src={videoUrl} controls style={{ width: '100%', maxHeight: '56vh', display: 'block' }}/>
          </div>
        </div>

        {/* Asset downloads row */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 32, flexWrap: 'wrap' }}>
          <a className="btn" href={`/outputs/${job.id}/translated.srt`} download>
            {I.arrow} .srt subtitles
          </a>
          <a className="btn" href={`/api/dub/${job.id}/transcripts.txt`}>
            {I.arrow} .txt transcript
          </a>
          <div style={{ flex: 1 }}/>
          <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', alignSelf: 'center' }}>
            files in ~/tachidubb/output/{job.id?.slice(0, 8)}/
          </span>
        </div>

        {/* ─────────────────────────────────────────────────── */}
        {/* POST-PROCESSING PANELS                                */}
        {/* ─────────────────────────────────────────────────── */}
        <div className="caps" style={{ marginBottom: 12 }}>Post-processing</div>

        <ExpandPanel
          open={open.subs} onToggle={() => toggle('subs')}
          title="Burn subtitles into video"
          subtitle="Hard-code subs at chosen style. Preview a frame first (~2s)."
          icon={<span style={{ fontSize: 13 }}>Aa</span>}
        >
          <SubsPanel job={job} onBurned={(url) => { setVideoOverrideUrl(url); setVideoVersion(v => v + 1); }}/>
        </ExpandPanel>

        <ExpandPanel
          open={open.lipsync} onToggle={() => toggle('lipsync')}
          title="Lip-sync (Wav2Lip)"
          subtitle="Match speaker mouth movement to dubbed audio. Optional — only useful for talking-head footage."
          icon={<span style={{ fontSize: 13 }}>◑</span>}
        >
          <LipSyncPanel job={job} onSynced={(url) => { setVideoOverrideUrl(url); setVideoVersion(v => v + 1); }}/>
        </ExpandPanel>

        <ExpandPanel
          open={open.regen} onToggle={() => toggle('regen')}
          title="Regenerate with different voice"
          subtitle="Keeps transcript & translation. Re-runs TTS only."
          icon={<span style={{ fontSize: 13 }}>↻</span>}
        >
          <RegenPanel job={job} voicePresets={voicePresets} onSubmitted={onSwitchToHistory}/>
        </ExpandPanel>
      </div>
    </div>
  );
}

// ── Export for Platform ────────────────────────────────────────────
function ExportPanel({ job }) {
  const PRESETS = [
    { id: 'youtube_1080p',     name: 'YouTube 1080p',  aspect: '16:9', detail: 'Native source aspect · safe everywhere',  hot: false },
    { id: 'youtube_4k',        name: 'YouTube 4K',     aspect: '16:9', detail: 'Up-rendered to 3840×2160',                hot: false },
    { id: 'tiktok',            name: 'TikTok',         aspect: '9:16', detail: '1080×1920 · subs burned · 30 fps',         hot: true  },
    { id: 'shorts',            name: 'Shorts',         aspect: '9:16', detail: 'YouTube vertical · 1080×1920',             hot: true  },
    { id: 'reels',             name: 'Reels',          aspect: '9:16', detail: 'Instagram vertical · 1080×1920',           hot: false },
    { id: 'instagram_square',  name: 'Instagram',      aspect: '1:1',  detail: '1080×1080 · feed posts',                   hot: false },
    { id: 'twitter',           name: 'Twitter / X',    aspect: '16:9', detail: '1280×720 · 2:20 max',                      hot: false },
  ];
  const [picked, setPicked] = useState(null);
  const [rendering, setRendering] = useState(false);
  const [doneUrl, setDoneUrl] = useState(null);
  const [error, setError] = useState(null);

  // Reset result state when the user picks a different preset
  useEffect(() => { setDoneUrl(null); setError(null); }, [picked]);

  const render = async () => {
    if (!picked) return;
    setRendering(true); setDoneUrl(null); setError(null);
    try {
      const fd = new FormData();
      fd.append('preset', picked);
      const r = await fetch(`/api/dub/${job.id}/export`, { method: 'POST', body: fd });
      const d = await r.json();
      if (d.url) setDoneUrl(d.url);
      else setError(d.error || d.detail || 'Export failed');
    } catch (e) { setError(String(e)); }
    finally { setRendering(false); }
  };

  const pickedPreset = PRESETS.find(p => p.id === picked);

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 12 }}>
        <div className="serif" style={{ fontSize: 22 }}>Export for platform</div>
        <span style={{ fontSize: 12, color: 'var(--ink-3)' }}>· pick a destination, we handle the format</span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(178px, 1fr))', gap: 10 }}>
        {PRESETS.map(p => (
          <PresetCard key={p.id} p={p} active={picked === p.id} onClick={() => setPicked(picked === p.id ? null : p.id)}/>
        ))}
      </div>
      {picked && (
        <div style={{
          marginTop: 14, padding: 16,
          background: 'var(--bg-1)', border: '1px solid var(--accent-dim)',
          borderRadius: 10, animation: 'slideUp 0.2s',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
            <div style={{ fontSize: 12.5, color: 'var(--ink)', fontWeight: 500 }}>
              {pickedPreset?.name} — {pickedPreset?.detail}
            </div>
            <div style={{ flex: 1 }}/>
            <button className="btn-ghost" style={{ padding: 4, color: 'var(--ink-3)' }} onClick={() => setPicked(null)}>{I.cancel}</button>
          </div>
          {error && (
            <div className="mono" style={{ fontSize: 10, color: 'var(--err)', marginBottom: 8, lineHeight: 1.5 }}>
              {I.warn} {error}
            </div>
          )}
          {doneUrl ? (
            <a href={doneUrl} download
              className="btn btn-primary"
              style={{ textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 6, justifyContent: 'center', width: '100%' }}>
              {I.arrow} Download {pickedPreset?.name}
            </a>
          ) : (
            <button onClick={render} disabled={rendering} className="btn btn-primary"
              style={{ width: '100%', justifyContent: 'center' }}>
              {rendering ? `Rendering for ${pickedPreset?.name}…` : `Render for ${pickedPreset?.name}  ▸`}
            </button>
          )}
          {rendering && (
            <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 6, textAlign: 'center' }}>
              re-encoding · {pickedPreset?.detail} · may take 30–120s
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function PresetCard({ p, active, onClick }) {
  const isVert = p.aspect === '9:16';
  const isSquare = p.aspect === '1:1';
  const fW = isVert ? 28 : isSquare ? 38 : 56;
  const fH = isVert ? 50 : isSquare ? 38 : 32;
  return (
    <button onClick={onClick} style={{
      padding: 14, textAlign: 'left',
      background: active ? 'var(--bg-2)' : 'var(--bg-1)',
      border: '1px solid ' + (active ? 'var(--accent)' : 'var(--line)'),
      borderRadius: 8, cursor: 'pointer', position: 'relative',
      transition: 'all 0.12s',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>
        <div style={{
          width: fW, height: fH, background: active ? 'var(--accent)' : 'var(--bg-3)',
          borderRadius: 3, flexShrink: 0,
          border: '1px solid ' + (active ? 'var(--accent)' : 'var(--line-2)'),
        }}/>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--ink)', display: 'flex', alignItems: 'center', gap: 6 }}>
            {p.name}
            {p.hot && <span className="mono" style={{ fontSize: 8, color: 'var(--accent)', padding: '1px 4px', border: '1px solid var(--accent)', borderRadius: 3 }}>HOT</span>}
          </div>
          <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 2 }}>{p.aspect}</div>
        </div>
      </div>
      <div style={{ fontSize: 11, color: 'var(--ink-3)', lineHeight: 1.4 }}>{p.detail}</div>
      {active && (
        <div style={{ position: 'absolute', top: 8, right: 8, color: 'var(--accent)' }}>{I.check}</div>
      )}
    </button>
  );
}

// ── Burn subs panel ──────────────────────────────────────────────────
function SubsPanel({ job, onBurned }) {
  const STYLES = [
    { id: 'default', name: 'Default',   detail: 'White outline, medium · safe' },
    { id: 'large',   name: 'Large',     detail: 'Bold + bigger · ideal for vertical' },
    { id: 'minimal', name: 'Minimal',   detail: 'Thin outline, smaller · clean studio' },
    { id: 'yellow',  name: 'Yellow',    detail: 'Classic cinema · sports / action' },
    { id: 'boxed',   name: 'Boxed',     detail: 'Opaque box · noisy backgrounds' },
  ];
  const [style, setStyle] = useState('default');
  const [previewUrl, setPreviewUrl] = useState(null);
  const [previewing, setPreviewing] = useState(false);
  const [burning, setBurning] = useState(false);
  const [error, setError] = useState(null);

  // Re-fetch preview when style changes
  useEffect(() => {
    let stale = false;
    setPreviewing(true); setError(null);
    const fd = new FormData();
    fd.append('style', style);
    fd.append('timestamp', '-1');
    fetch(`/api/dub/${job.id}/subs_preview`, { method: 'POST', body: fd })
      .then(r => r.json())
      .then(d => {
        if (stale) return;
        if (d.url || d.preview_url) setPreviewUrl((d.url || d.preview_url) + '?t=' + Date.now());
        else if (d.error) setError(d.error);
      })
      .catch(e => { if (!stale) setError(String(e)); })
      .finally(() => { if (!stale) setPreviewing(false); });
    return () => { stale = true; };
  }, [style, job.id]);

  const burn = async () => {
    setBurning(true); setError(null);
    try {
      const fd = new FormData();
      fd.append('style', style);
      const r = await fetch(`/api/dub/${job.id}/burn_subs`, { method: 'POST', body: fd });
      const d = await r.json();
      if (d.url) onBurned(d.url);
      else setError(d.error || d.detail || 'Burn failed');
    } catch (e) { setError(String(e)); }
    finally { setBurning(false); }
  };

  return (
    <div style={{ display: 'flex', gap: 14, marginTop: 14 }}>
      <div style={{ flex: 1 }}>
        <div className="caps" style={{ marginBottom: 8 }}>Style</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {STYLES.map(s => (
            <button key={s.id} onClick={() => setStyle(s.id)} style={{
              padding: '9px 12px', textAlign: 'left',
              background: style === s.id ? 'var(--bg-2)' : 'var(--bg-1)',
              border: '1px solid ' + (style === s.id ? 'var(--accent)' : 'var(--line)'),
              borderRadius: 6, color: 'var(--ink)', cursor: 'pointer',
            }}>
              <div style={{ fontSize: 12.5, fontWeight: 500 }}>{s.name}</div>
              <div className="mono" style={{ fontSize: 10, color: 'var(--ink-3)', marginTop: 2 }}>{s.detail}</div>
            </button>
          ))}
        </div>
      </div>
      <div style={{ width: 360, flexShrink: 0 }}>
        <div className="caps" style={{ marginBottom: 8 }}>Preview · single frame</div>
        <div style={{
          width: '100%', aspectRatio: '16 / 9',
          background: '#0d0f14', border: '1px solid var(--line)', borderRadius: 6,
          overflow: 'hidden', position: 'relative',
        }}>
          {previewUrl
            ? <img src={previewUrl} alt="preview" style={{ width: '100%', height: '100%', objectFit: 'contain' }}/>
            : (
              <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 8 }}>
                {previewing
                  ? <span className="mono" style={{ fontSize: 10, color: 'var(--ink-3)' }}>Rendering preview…</span>
                  : <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>—</span>}
              </div>
            )
          }
        </div>
        {error && (
          <div className="mono" style={{ fontSize: 10, color: 'var(--err)', marginTop: 6, lineHeight: 1.5 }}>
            {I.warn} {error}
          </div>
        )}
        <button onClick={burn} disabled={burning} className="btn btn-primary" style={{ marginTop: 10, width: '100%', justifyContent: 'center' }}>
          {burning ? 'Burning…' : 'Burn into full video  ▸'}
        </button>
        <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 6, textAlign: 'center' }}>
          preview ~2s · full burn ~30-90s
        </div>
      </div>
    </div>
  );
}

// ── Lip-sync panel ──────────────────────────────────────────────────
function LipSyncPanel({ job, onSynced }) {
  const [lipStatus, setLipStatus] = useState(null);
  const [running, setRunning] = useState(false);
  const [error, setError] = useState(null);

  const refresh = useCallback(() => {
    fetch('/api/lip_sync/status').then(r => r.json()).then(setLipStatus).catch(() => {});
  }, []);
  useEffect(() => { refresh(); }, [refresh]);

  const run = async () => {
    setRunning(true); setError(null);
    try {
      const r = await fetch(`/api/dub/${job.id}/lip_sync`, { method: 'POST' });
      const d = await r.json();
      if (d.url) onSynced(d.url);
      else if (d.error) setError(d.error);
      else if (d.guide) {/* not installed */}
    } catch (e) { setError(String(e)); }
    finally { setRunning(false); }
  };

  if (!lipStatus) {
    return <div style={{ paddingTop: 14, fontSize: 12, color: 'var(--ink-3)' }}>Checking…</div>;
  }

  if (!lipStatus.installed) {
    const guide = lipStatus.guide || {};
    const steps = guide.steps || [
      'git clone https://github.com/Rudrabha/Wav2Lip.git',
      'pip install -r Wav2Lip/requirements.txt',
      'wget -P Wav2Lip/checkpoints/ https://iitbacin.sharepoint.com/.../wav2lip_gan.pth',
    ];
    return (
      <div style={{ paddingTop: 14 }}>
        <div style={{
          padding: 12, marginBottom: 12,
          background: 'oklch(0.78 0.15 60 / 0.08)',
          border: '1px solid oklch(0.78 0.15 60 / 0.25)',
          borderRadius: 6, display: 'flex', gap: 10, alignItems: 'flex-start',
        }}>
          <span style={{ color: 'var(--warn)', marginTop: 2 }}>{I.warn}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12.5, color: 'var(--ink)', fontWeight: 500, marginBottom: 4 }}>
              Wav2Lip not installed
            </div>
            <div style={{ fontSize: 11.5, color: 'var(--ink-3)', lineHeight: 1.5 }}>
              Optional one-time setup. Adds ~1.4 GB. Only worth installing if your videos are mostly close-up talking heads.
            </div>
          </div>
        </div>
        <div className="caps" style={{ marginBottom: 8 }}>Install steps · copy & run</div>
        {steps.map((cmd, i) => (
          <div key={i} style={{
            display: 'flex', alignItems: 'center', gap: 10,
            padding: '8px 12px', background: 'var(--bg-2)', border: '1px solid var(--line)',
            borderRadius: 6, marginBottom: 6,
          }}>
            <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', width: 20 }}>{i + 1}</span>
            <code className="mono" style={{ fontSize: 11, color: 'var(--ink-2)', flex: 1, overflow: 'auto', whiteSpace: 'nowrap' }}>{cmd}</code>
            <button className="btn-ghost" onClick={() => navigator.clipboard?.writeText(cmd)} style={{ padding: 4, color: 'var(--ink-3)' }} title="Copy">{I.copy}</button>
          </div>
        ))}
        <button onClick={refresh} className="btn" style={{ marginTop: 10 }}>
          {I.refresh} Check again
        </button>
      </div>
    );
  }

  return (
    <div style={{ paddingTop: 14 }}>
      <div style={{ fontSize: 12.5, color: 'var(--ink-2)', marginBottom: 10 }}>
        Wav2Lip detected at <code className="mono" style={{ color: 'var(--ink)' }}>{lipStatus.repo_dir}</code>
      </div>
      <button onClick={run} disabled={running} className="btn btn-primary">
        {running ? 'Running lip-sync…' : 'Run lip-sync pass  ▸'}
      </button>
      {error && (
        <div className="mono" style={{ fontSize: 10, color: 'var(--err)', marginTop: 8, lineHeight: 1.5 }}>
          {I.warn} {error}
        </div>
      )}
      <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 8 }}>
        ~4-8 minutes on a single video · faces must be visible &amp; centered
      </div>
    </div>
  );
}

// ── Regenerate-with-different-voice panel ──────────────────────────
function RegenPanel({ job, voicePresets, onSubmitted }) {
  const [voicePreset, setVoicePreset] = useState(job.voice_preset || 'auto');
  const [voiceStyle, setVoiceStyle] = useState('');
  const [ttsSpeed, setTtsSpeed] = useState(job.tts_speed || 'balanced');
  const [refFile, setRefFile] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState(null);

  const submit = async () => {
    setSubmitting(true); setError(null);
    try {
      const fd = new FormData();
      fd.append('voice_preset', voicePreset);
      fd.append('voice_style', voiceStyle);
      fd.append('tts_speed', ttsSpeed);
      if (refFile) fd.append('reference', refFile);
      const r = await fetch(`/api/dub/${job.id}/retry_tts`, { method: 'POST', body: fd });
      const d = await r.json();
      if (d.ok) onSubmitted();
      else setError(d.error || d.detail || 'Submit failed');
    } catch (e) { setError(String(e)); }
    finally { setSubmitting(false); }
  };

  return (
    <div style={{ paddingTop: 14, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
      <div>
        <Field label="Voice preset">
          <Select value={voicePreset} onChange={setVoicePreset}>
            <option value="auto" style={{ background: '#16161c' }}>auto · clone source</option>
            {voicePresets.map(p => (
              <option key={p.id} value={p.id} style={{ background: '#16161c' }}>{p.name}</option>
            ))}
          </Select>
        </Field>
        <div style={{ marginTop: 12 }}>
          <Field label="Voice style (optional)" hint="Free-text prompt: 'warm female narrator', 'energetic young male'.">
            <input className="field" value={voiceStyle} onChange={e => setVoiceStyle(e.target.value)} placeholder="—"/>
          </Field>
        </div>
      </div>
      <div>
        <Field label="Voice reference (optional)" hint="WAV/MP3 of clean speech.">
          <FileSlot file={refFile} setFile={setRefFile} accept="audio/*"/>
        </Field>
        <div style={{ marginTop: 12 }}>
          <Field label="TTS speed">
            <div style={{ display: 'flex', gap: 6 }}>
              {['fast', 'balanced', 'quality'].map(s => (
                <button key={s} onClick={() => setTtsSpeed(s)} className="btn" style={{
                  flex: 1, justifyContent: 'center',
                  borderColor: ttsSpeed === s ? 'var(--accent)' : 'var(--line)',
                  background: ttsSpeed === s ? 'var(--bg-2)' : 'var(--bg-1)',
                  color: ttsSpeed === s ? 'var(--ink)' : 'var(--ink-2)',
                }}>{s}</button>
              ))}
            </div>
          </Field>
        </div>
        <button onClick={submit} disabled={submitting} className="btn btn-primary" style={{ marginTop: 14, width: '100%', justifyContent: 'center' }}>
          {submitting ? 'Queueing…' : 'Regenerate all segments  ▸'}
        </button>
        {error && (
          <div className="mono" style={{ fontSize: 10, color: 'var(--err)', marginTop: 8 }}>
            {I.warn} {error}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// REVIEW VIEW — wizard pause. Speakers left + segments right.

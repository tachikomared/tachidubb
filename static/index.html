// ═══════════════════════════════════════════════════════════════════
function ReviewView({ jobs, selectedJobId, voicePresets, onContinued, onCancel, onPickJob }) {
  const reviewJobs = useMemo(
    () => jobs.filter(j => j.status === 'awaiting_translation_review' || j.status === 'awaiting_transcript_review'),
    [jobs]
  );

  // Auto-pick first review job if no explicit pick
  const job = useMemo(() => {
    if (selectedJobId) return jobs.find(j => j.id === selectedJobId);
    return reviewJobs[0];
  }, [jobs, selectedJobId, reviewJobs]);

  if (!job) {
    return (
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16, padding: 40, background: 'var(--bg)' }}>
        <div className="caps">No reviews pending</div>
        <div className="serif" style={{ fontSize: 32, letterSpacing: '-0.015em', textAlign: 'center', maxWidth: 480 }}>
          Wizard mode is <span style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>quiet</span>.
        </div>
        <div style={{ fontSize: 13, color: 'var(--ink-3)', textAlign: 'center', maxWidth: 380, lineHeight: 1.5 }}>
          When a job is run with wizard mode on, it pauses after translation so you can edit segments and replace voice references before TTS starts.
        </div>
      </div>
    );
  }

  return <ReviewViewInner job={job} reviewJobs={reviewJobs} voicePresets={voicePresets} onContinued={onContinued} onCancel={onCancel} onPickJob={onPickJob}/>;
}

function ReviewViewInner({ job, reviewJobs, voicePresets, onContinued, onCancel, onPickJob }) {
  const [checkpoint, setCheckpoint] = useState(null);
  const [speakers, setSpeakers] = useState([]);
  const [loadError, setLoadError] = useState(null);
  const [edits, setEdits] = useState({});  // { idx: newText }
  const [filter, setFilter] = useState('all');  // all | edited
  const [speakerFilter, setSpeakerFilter] = useState(null);
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [continuing, setContinuing] = useState(false);

  // Load checkpoint + speakers when job changes
  useEffect(() => {
    setCheckpoint(null); setSpeakers([]); setLoadError(null); setEdits({}); setSelectedIdx(null);
    const stage = job.status === 'awaiting_translation_review' ? 'translation_done' : 'transcription_done';
    fetch(`/api/dub/${job.id}/checkpoint/${stage}`)
      .then(r => r.json())
      .then(d => {
        if (d.error) setLoadError(d.error);
        else setCheckpoint(d);
      })
      .catch(e => setLoadError(String(e)));
    fetch(`/api/job/${job.id}/speakers`)
      .then(r => r.json())
      .then(d => setSpeakers(d.speakers || []))
      .catch(() => {});
  }, [job.id, job.status]);

  const continueJob = async () => {
    setContinuing(true);
    try {
      // Save edits if any
      if (Object.keys(edits).length > 0) {
        const fd = new FormData();
        fd.append('edits', JSON.stringify(edits));
        await fetch(`/api/dub/${job.id}/edit_translations`, { method: 'POST', body: fd });
      }
      // Continue pipeline
      const fd2 = new FormData();
      const r = await fetch(`/api/dub/${job.id}/continue`, { method: 'POST', body: fd2 });
      if (r.ok) onContinued();
      else alert('Continue failed');
    } finally { setContinuing(false); }
  };

  const cancelJob = async () => {
    if (!confirm('Discard this job?')) return;
    await fetch(`/api/dub/${job.id}/cancel`, { method: 'POST' });
    onCancel();
  };

  const segments = checkpoint?.segments || [];
  const editedCount = Object.keys(edits).length;

  // Filter segments
  const filteredSegs = useMemo(() => {
    let arr = segments;
    if (speakerFilter) arr = arr.filter(s => (s.speaker || 'SPEAKER_00') === speakerFilter);
    if (filter === 'edited') arr = arr.filter(s => edits[s.idx] !== undefined);
    return arr;
  }, [segments, filter, speakerFilter, edits]);

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: 'var(--bg)' }}>

      {/* Banner */}
      <div style={{
        padding: '14px 36px',
        background: 'oklch(0.78 0.15 60 / 0.06)',
        borderBottom: '1px solid var(--line)',
        display: 'flex', alignItems: 'center', gap: 14, flexShrink: 0,
      }}>
        <div style={{
          width: 28, height: 28, borderRadius: 6,
          background: 'oklch(0.78 0.15 60 / 0.14)', border: '1px solid oklch(0.78 0.15 60 / 0.3)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: 'var(--warn)',
        }}>{I.review}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, color: 'var(--ink)', fontWeight: 500 }}>
            Pipeline paused — wizard mode.
          </div>
          <div style={{ fontSize: 11.5, color: 'var(--ink-3)', marginTop: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {job.source_label || job.source || job.id} · {segments.length} segments to review
          </div>
        </div>
        {reviewJobs.length > 1 && (
          <Select value={job.id} onChange={onPickJob}>
            {reviewJobs.map(j => <option key={j.id} value={j.id} style={{ background: '#16161c' }}>{(j.source_label || j.source || j.id).slice(0, 60)}</option>)}
          </Select>
        )}
        {editedCount > 0 && <span className="chip" style={{ background: 'var(--bg-2)', color: 'var(--ink-2)' }}>{editedCount} edit{editedCount === 1 ? '' : 's'}</span>}
        <button onClick={cancelJob} className="btn">{I.cancel} Discard</button>
        <button onClick={continueJob} disabled={continuing} className="btn btn-primary">
          {I.check} {continuing ? 'Continuing…' : 'Approve & continue'}
        </button>
      </div>

      {loadError && (
        <div style={{ padding: 24, textAlign: 'center', color: 'var(--err)', fontSize: 12 }}>
          Couldn't load checkpoint: {loadError}
        </div>
      )}

      {!loadError && !checkpoint && (
        <div style={{ padding: 24, textAlign: 'center', color: 'var(--ink-3)', fontSize: 12 }}>
          Loading checkpoint…
        </div>
      )}

      {checkpoint && (
        <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
          {/* LEFT — speakers (40%) */}
          <div style={{ width: '40%', minWidth: 320, borderRight: '1px solid var(--line)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            <div style={{ padding: '20px 24px 12px' }}>
              <div className="caps" style={{ marginBottom: 6 }}>Speakers</div>
              <div className="serif" style={{ fontSize: 20, lineHeight: 1.15, letterSpacing: '-0.01em' }}>
                Check each voice <span style={{ color: 'var(--ink-3)', fontStyle: 'italic' }}>before they clone it</span>.
              </div>
            </div>
            <div className="scroll" style={{ flex: 1, padding: '4px 18px 24px', display: 'flex', flexDirection: 'column', gap: 8 }}>
              <button onClick={() => setSpeakerFilter(null)} style={{
                padding: '8px 12px', fontSize: 11, textAlign: 'left',
                background: !speakerFilter ? 'var(--bg-2)' : 'transparent',
                border: '1px solid ' + (!speakerFilter ? 'var(--line-2)' : 'transparent'),
                color: !speakerFilter ? 'var(--ink)' : 'var(--ink-3)',
                borderRadius: 6, cursor: 'pointer',
              }}>
                <span className="caps">All speakers · {segments.length} segments</span>
              </button>
              {speakers.length === 0 && (
                <div style={{ padding: 14, fontSize: 11.5, color: 'var(--ink-4)', fontStyle: 'italic' }}>
                  No speaker references found for this job.
                </div>
              )}
              {speakers.map(sp => (
                <SpeakerCard
                  key={sp.speaker}
                  sp={sp}
                  jobId={job.id}
                  selected={speakerFilter === sp.speaker}
                  segCount={segments.filter(s => (s.speaker || 'SPEAKER_00') === sp.speaker).length}
                  onClick={() => setSpeakerFilter(speakerFilter === sp.speaker ? null : sp.speaker)}
                  onReplaced={() => fetch(`/api/job/${job.id}/speakers`).then(r => r.json()).then(d => setSpeakers(d.speakers || []))}
                />
              ))}
            </div>
          </div>

          {/* RIGHT — segments (60%) */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>
            <div style={{ padding: '20px 28px 4px' }}>
              <div className="caps" style={{ marginBottom: 6 }}>Translations</div>
              <div className="serif" style={{ fontSize: 20, lineHeight: 1.15 }}>
                Read every line <span style={{ color: 'var(--ink-3)', fontStyle: 'italic' }}>before voices commit</span>.
              </div>
            </div>
            <div style={{ padding: '8px 28px 0', display: 'flex', gap: 20, borderBottom: '1px solid var(--line)' }}>
              <div className={'tab' + (filter === 'all' ? ' active' : '')} onClick={() => setFilter('all')}>
                All · {filteredSegs.length}
              </div>
              <div className={'tab' + (filter === 'edited' ? ' active' : '')} onClick={() => setFilter('edited')}>
                Edited · {editedCount}
              </div>
            </div>
            <div className="scroll" style={{ flex: 1, padding: '10px 24px 28px', display: 'flex', flexDirection: 'column', gap: 4 }}>
              {filteredSegs.length === 0 ? (
                <div style={{ padding: '40px 0', textAlign: 'center', color: 'var(--ink-3)', fontSize: 12 }}>
                  No segments match.
                </div>
              ) : filteredSegs.map(seg => (
                <SegmentRow
                  key={seg.idx}
                  seg={seg}
                  selected={selectedIdx === seg.idx}
                  onSelect={() => setSelectedIdx(selectedIdx === seg.idx ? null : seg.idx)}
                  editedValue={edits[seg.idx]}
                  onEdit={v => setEdits({ ...edits, [seg.idx]: v })}
                  onRevert={() => { const c = { ...edits }; delete c[seg.idx]; setEdits(c); }}
                />
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Pastel palette for speakers — cycles deterministically through 6 colors
// keyed off the speaker number (so SPEAKER_00 always gets the same color).
function speakerColor(spkId) {
  const palette = ['#8ad5d5', '#d8a0d8', '#d4cf8a', '#d9a58a', '#a0c0d8', '#bcd5b3'];
  const m = String(spkId).match(/(\d+)$/);
  const i = m ? parseInt(m[1], 10) % palette.length : 0;
  return palette[i];
}

function SpeakerCard({ sp, jobId, selected, segCount, onClick, onReplaced }) {
  const [playing, setPlaying] = useState(false);
  const audioRef = useRef(null);
  const inputRef = useRef(null);
  const isShort = sp.duration_sec < 10;
  const color = speakerColor(sp.speaker);

  const play = (e) => {
    e.stopPropagation();
    if (!audioRef.current) {
      audioRef.current = new Audio(sp.audio_url);
      audioRef.current.onended = () => setPlaying(false);
    }
    if (playing) {
      audioRef.current.pause();
      audioRef.current.currentTime = 0;
      setPlaying(false);
    } else {
      audioRef.current.play().then(() => setPlaying(true)).catch(() => {});
    }
  };

  const replace = async (file) => {
    if (!file) return;
    const fd = new FormData();
    fd.append('reference', file);
    await fetch(`/api/dub/${jobId}/edit_speaker_ref/${sp.speaker}`, { method: 'POST', body: fd });
    onReplaced();
  };

  return (
    <div onClick={onClick} style={{
      padding: 14,
      background: selected ? 'var(--bg-2)' : 'var(--bg-1)',
      border: '1px solid ' + (selected ? 'var(--accent-dim)' : isShort ? 'oklch(0.78 0.15 60 / 0.3)' : 'var(--line)'),
      borderRadius: 8, cursor: 'pointer',
      boxShadow: selected ? 'inset 0 0 0 1px var(--accent-dim)' : 'none',
      transition: 'all 0.12s',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
        <div style={{
          width: 32, height: 32, borderRadius: 6,
          background: color + '1f', border: '1px solid ' + color + '55',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: color, fontSize: 10, fontWeight: 700,
          fontFamily: 'var(--mono)', flexShrink: 0,
        }}>{sp.speaker.replace('SPEAKER_', '').slice(0, 3)}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--ink)' }}>{sp.speaker}</div>
          <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 2 }}>
            {segCount} segments · ref {sp.duration_sec?.toFixed(1)}s
          </div>
        </div>
        {isShort && <span title="Short reference — clone may degrade" style={{ color: 'var(--warn)' }}>{I.warn}</span>}
      </div>

      <div onClick={e => e.stopPropagation()} style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '8px 10px', background: 'var(--bg-2)', border: '1px solid var(--line)', borderRadius: 6,
      }}>
        <button onClick={play} style={{
          width: 24, height: 24, borderRadius: 4,
          background: color, color: '#0a0a0d',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          flexShrink: 0,
        }} title={playing ? 'Stop' : 'Play'}>
          {playing
            ? <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect x="2" y="2" width="2.5" height="6"/><rect x="5.5" y="2" width="2.5" height="6"/></svg>
            : <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M2 2v6l5-3z"/></svg>}
        </button>
        <img src={sp.waveform_url} alt="" style={{ flex: 1, height: 22, objectFit: 'cover', opacity: 0.85 }}
          onError={e => { e.target.style.display = 'none'; }}/>
        <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', flexShrink: 0 }}>
          {sp.duration_sec?.toFixed(1)}s
        </span>
      </div>

      <div onClick={e => e.stopPropagation()} style={{ display: 'flex', gap: 6, marginTop: 10 }}>
        <input ref={inputRef} type="file" accept="audio/*" style={{ display: 'none' }}
          onChange={e => replace(e.target.files[0])}/>
        <button onClick={() => inputRef.current?.click()} className="btn" style={{ flex: 1, justifyContent: 'center' }}>
          {I.upload} Replace reference
        </button>
      </div>
    </div>
  );
}

function SegmentRow({ seg, selected, onSelect, editedValue, onEdit, onRevert }) {
  const isEdited = editedValue !== undefined;
  const shown = isEdited ? editedValue : (seg.translated_text || '');
  const color = speakerColor(seg.speaker || 'SPEAKER_00');

  return (
    <div onClick={onSelect} style={{
      padding: '11px 14px',
      background: selected ? 'var(--bg-2)' : 'transparent',
      border: '1px solid ' + (selected ? 'var(--accent-dim)' : 'transparent'),
      borderRadius: 6, cursor: 'pointer',
      transition: 'all 0.12s',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
        <span className="dot" style={{ background: color }}/>
        <span className="mono" style={{ fontSize: 10, color: 'var(--ink-2)' }}>{seg.speaker || 'SPEAKER_00'}</span>
        <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>
          {fmtSec(seg.start)} · {(seg.end - seg.start).toFixed(1)}s
        </span>
        <div style={{ flex: 1 }}/>
        {isEdited && (
          <span className="mono" style={{ fontSize: 9, color: 'var(--accent)', padding: '1px 5px', border: '1px solid var(--accent)', borderRadius: 3 }}>
            EDITED
          </span>
        )}
      </div>
      <div style={{ fontSize: 12, color: 'var(--ink-3)', marginBottom: 6, lineHeight: 1.5, fontStyle: 'italic' }}>
        {seg.text}
      </div>
      {selected ? (
        <div onClick={e => e.stopPropagation()}>
          <textarea value={shown} onChange={e => onEdit(e.target.value)} className="field"
            style={{ resize: 'vertical', minHeight: 56, fontSize: 13, lineHeight: 1.5, fontFamily: 'var(--sans)' }}/>
          {isEdited && (
            <div style={{ display: 'flex', gap: 6, marginTop: 6, justifyContent: 'flex-end' }}>
              <button onClick={onRevert} className="btn" style={{ padding: '4px 8px', fontSize: 10 }}>
                {I.refresh} Revert
              </button>
            </div>
          )}
        </div>
      ) : (
        <div style={{ fontSize: 13, color: 'var(--ink)', lineHeight: 1.5 }}>{shown || <span style={{ color: 'var(--ink-4)', fontStyle: 'italic' }}>(no translation)</span>}</div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// BATCH VIEW — group jobs by batch_id. Active batches at top, completed
// below. Reads from the same /api/jobs poll as History.
// ═══════════════════════════════════════════════════════════════════
function BatchView({ jobs, onRefresh, onJumpProcessing, onJumpResult, onJumpHome }) {
  // Group jobs by batch_id. Jobs without a batch_id are skipped — they're
  // single-video runs and live in History instead.
  const batches = useMemo(() => {
    const map = new Map();
    for (const j of jobs) {
      const bid = j.batch_id;
      if (!bid) continue;
      if (!map.has(bid)) {
        map.set(bid, {
          id: bid,
          label: j.batch_label || `Batch · ${bid.slice(0, 12)}`,
          created: j.created || 0,
          jobs: [],
        });
      }
      map.get(bid).jobs.push(j);
    }
    // Sort jobs inside each batch by their created time, batches by most-recent
    return Array.from(map.values())
      .map(b => ({
        ...b,
        jobs: [...b.jobs].sort((a, b2) => (a.created || 0) - (b2.created || 0)),
      }))
      .sort((a, b) => (b.created || 0) - (a.created || 0));
  }, [jobs]);

  // Active batch: any with at least one running/queued/scheduled job
  const activeBatches = batches.filter(b => b.jobs.some(j => ACTIVE_STATUSES.has(j.status) || j.status === 'scheduled'));
  const completedBatches = batches.filter(b => !activeBatches.includes(b));

  return (
    <div style={{ flex: 1, overflow: 'auto', background: 'var(--bg)' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', padding: '36px 36px 80px' }}>

        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 26, gap: 20 }}>
          <div>
            <div className="caps">Batch</div>
            <div className="serif" style={{ fontSize: 36, lineHeight: 1.05, letterSpacing: '-0.015em', marginTop: 4 }}>
              Many at once, <span style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>cleanly</span>.
            </div>
            <div style={{ color: 'var(--ink-3)', marginTop: 6, fontSize: 13, maxWidth: 540 }}>
              Group runs scheduled together. Best for overnight queues — set 10 videos, walk away, come back to QA in the morning.
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={onRefresh} className="btn">{I.refresh} Refresh</button>
            <button onClick={onJumpHome} className="btn btn-primary">{I.plus} New batch</button>
          </div>
        </div>

        {/* Empty state */}
        {batches.length === 0 && (
          <div style={{
            padding: '60px 40px', textAlign: 'center',
            background: 'var(--bg-1)', border: '1px solid var(--line)',
            borderRadius: 12,
          }}>
            <div className="caps" style={{ marginBottom: 8 }}>No batches yet</div>
            <div className="serif" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 10 }}>
              Queue 5+ videos at once <span style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>and they appear here</span>.
            </div>
            <div style={{ fontSize: 12.5, color: 'var(--ink-3)', maxWidth: 440, margin: '0 auto 18px', lineHeight: 1.55 }}>
              Switch to "Batch — many videos" on the Home form, drop files or paste a list of URLs, hit Queue.
            </div>
            <button onClick={onJumpHome} className="btn btn-primary">{I.arrow} Set up a batch</button>
          </div>
        )}

        {/* Active */}
        {activeBatches.length > 0 && (
          <div style={{ marginBottom: 36 }}>
            <div className="caps" style={{ marginBottom: 10 }}>Active · {activeBatches.length}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {activeBatches.map(b => {
                const isShowcase = b.jobs.some(j => j.batch_kind === 'showcase');
                const isQuickTest = b.jobs.some(j => j.batch_kind === 'quick_test');
                if (isShowcase)  return <ShowcaseBatchCard key={b.id} batch={b}/>;
                if (isQuickTest) return <QuickTestBatchCard key={b.id} batch={b}/>;
                return <BatchCard key={b.id} batch={b}
                  onJumpProcessing={onJumpProcessing}
                  onJumpResult={onJumpResult}
                  onRefresh={onRefresh}/>;
              })}
            </div>
          </div>
        )}

        {/* Completed */}
        {completedBatches.length > 0 && (
          <div>
            <div className="caps" style={{ marginBottom: 10 }}>Completed · {completedBatches.length}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {completedBatches.map(b => {
                const isShowcase = b.jobs.some(j => j.batch_kind === 'showcase');
                const isQuickTest = b.jobs.some(j => j.batch_kind === 'quick_test');
                if (isShowcase)  return <ShowcaseBatchCard key={b.id} batch={b}/>;
                if (isQuickTest) return <QuickTestBatchCard key={b.id} batch={b}/>;
                return <BatchCard key={b.id} batch={b}
                  onJumpProcessing={onJumpProcessing}
                  onJumpResult={onJumpResult}
                  onRefresh={onRefresh}/>;
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Quick-test batch — comparison grid of N languages ──────────────
function QuickTestBatchCard({ batch }) {
  const [stitching, setStitching] = useState(false);

  const langName = (code) => {
    const l = LANGS.find(x => x.c === code);
    return l ? l.n : (code || '').toUpperCase();
  };

  const sortedJobs = useMemo(() => {
    return [...batch.jobs].sort(
      (a, b) => (a.batch_position ?? 0) - (b.batch_position ?? 0)
    );
  }, [batch.jobs]);

  const allComplete = sortedJobs.length > 0 &&
    sortedJobs.every(j => j.status === 'complete');

  const stitchToShowcase = async () => {
    setStitching(true);
    try {
      const r = await fetch(`/api/showcase/from_batch/${batch.id}`, { method: 'POST' });
      const d = await r.json();
      if (!d.ok) { alert(d.error || 'Failed to start showcase assembly'); setStitching(false); }
      // On success the batch_kind flips to 'showcase' server-side; the next
      // jobs poll re-renders this as ShowcaseBatchCard automatically.
    } catch (e) {
      alert(String(e.message || e));
      setStitching(false);
    }
  };

  const statusPill = (j) => {
    if (j.status === 'complete') return { c: 'var(--accent)', t: 'done' };
    if (j.status === 'error')    return { c: 'var(--err)',    t: 'error' };
    if (j.status === 'queued')   return { c: 'var(--ink-4)',  t: 'queued' };
    if (j.status === 'scheduled')return { c: 'var(--ink-4)',  t: 'scheduled' };
    return { c: 'var(--warn)', t: j.status || 'running' };
  };

  return (
    <div style={{
      padding: 18, background: 'var(--bg-1)',
      border: '1px solid var(--line)', borderRadius: 10,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
        <div className="caps">Quick test</div>
        <div className="serif" style={{ fontSize: 18 }}>{batch.label}</div>
        <div style={{ flex: 1 }}/>
        {allComplete && (
          <button
            className="btn btn-primary"
            disabled={stitching}

// ── Showcase batch — one stitched multilingual reel + per-lang sources ──
function ShowcaseBatchCard({ batch }) {
  const [showcase, setShowcase] = useState(null);   // { status, url, manifest, ... }
  const [showSources, setShowSources] = useState(false);
  const [rebuilding, setRebuilding] = useState(false);

  const rebuild = async () => {
    setRebuilding(true);
    try {
      const r = await fetch(`/api/showcase/${batch.id}/rebuild`, { method: 'POST' });
      const d = await r.json();
      if (d.ok) setShowcase({ status: 'assembling' });  // restart polling
      else alert(d.error || 'Rebuild failed');
    } catch (e) {
      alert(String(e.message || e));
    } finally {
      setRebuilding(false);
    }
  };

  const langName = (code) => {
    const l = LANGS.find(x => x.c === code);
    return l ? l.n : (code || '').toUpperCase();
  };

  const sortedJobs = useMemo(() => (
    [...batch.jobs].sort((a, b) => (a.batch_position ?? 0) - (b.batch_position ?? 0))
  ), [batch.jobs]);

  const done = sortedJobs.filter(j => j.status === 'complete').length;
  const errored = sortedJobs.filter(j => j.status === 'error').length;
  const total = sortedJobs.length;
  const allComplete = done === total && total > 0;

  // Poll the showcase status until it's ready (or errors out)
  useEffect(() => {
    let live = true;
    const poll = async () => {
      try {
        const r = await fetch(`/api/showcase/${batch.id}`);
        if (!live) return;
        if (r.ok) {
          const d = await r.json();
          setShowcase(d);
        } else if (r.status === 500) {
          const d = await r.json().catch(() => ({}));
          setShowcase({ status: 'error', error: d.error || 'Assembly failed' });
        }
      } catch (_) { /* ignore — keep polling */ }
    };
    poll();
    // Poll only while we're waiting for assembly to finish
    if (!showcase || (showcase.status !== 'ready' && showcase.status !== 'error')) {
      const t = setInterval(poll, 3000);
      return () => { live = false; clearInterval(t); };
    }
    return () => { live = false; };
  }, [batch.id, showcase?.status, allComplete]);

  const statusPill = (j) => {
    if (j.status === 'complete') return { c: 'var(--accent)', t: 'done' };
    if (j.status === 'error')    return { c: 'var(--err)',    t: 'error' };
    if (j.status === 'queued')   return { c: 'var(--ink-4)',  t: 'queued' };
    return { c: 'var(--warn)', t: j.status || 'running' };
  };

  const reelUrl = showcase?.status === 'ready'
    ? `${showcase.url}?v=${Math.floor((showcase.manifest?.created || 0))}`
    : null;

  return (
    <div style={{
      padding: 18, background: 'var(--bg-1)',
      border: '1px solid var(--line)', borderRadius: 10,
    }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 14 }}>
        <div className="caps">Showcase reel</div>
        <div className="serif" style={{ fontSize: 18 }}>{batch.label}</div>
        <div style={{ flex: 1 }}/>
        <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>{batch.id}</div>
      </div>

      {/* Hero: the stitched reel itself */}
      {reelUrl ? (
        <div style={{ marginBottom: 14 }}>
          <video src={reelUrl} controls
                 style={{ width: '100%', borderRadius: 8, background: '#000', maxHeight: 520 }}/>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 8 }}>
            <a href={reelUrl} download={`showcase_${batch.id}.mp4`}
               className="mono"
               style={{ fontSize: 11, color: 'var(--accent)', textDecoration: 'none' }}>
              ▸ download multilingual reel
            </a>
            <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>
              {sortedJobs.length} languages ·{' '}
              {(showcase.manifest?.total_seconds || 0).toFixed(1)}s total
            </div>
          </div>
          {/* Slice manifest — which language plays when */}
          {showcase.manifest?.slices && (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 10 }}>
              {showcase.manifest.slices.map((s, i) => (
                <div key={i} style={{
                  padding: '4px 8px', background: 'var(--bg)',
                  border: '1px solid var(--line)', borderRadius: 4,
                  fontSize: 10.5,
                }}>
                  <span className="mono" style={{ color: 'var(--accent)', marginRight: 6 }}>
                    {(s.lang || '').toUpperCase()}
                  </span>
                  <span style={{ color: 'var(--ink-3)' }}>
                    {(s.dub_start ?? s.start ?? 0).toFixed(1)}–{(s.dub_end ?? s.end ?? 0).toFixed(1)}s
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>
      ) : (
        <div style={{
          padding: 18, marginBottom: 14,
          background: 'var(--bg)', borderRadius: 8,
          border: '1px dashed var(--line)',
          textAlign: 'center',
        }}>
          <div className="mono" style={{ fontSize: 11, color: 'var(--ink-3)', marginBottom: 6 }}>
            {showcase?.status === 'error' ? 'Stitch step failed' :
             allComplete ? 'Stitching segments into one reel…' :
             `Dubbing ${done}/${total} languages` +
             (errored ? ` · ${errored} errored` : '') + '…'}
          </div>
          {showcase?.status === 'error' && (
            <div className="mono" style={{ fontSize: 10, color: 'var(--err)', whiteSpace: 'pre-wrap', textAlign: 'left' }}>
              {showcase.error}
            </div>
          )}
          <div style={{
            height: 6, background: 'var(--bg-2)', borderRadius: 3,
            overflow: 'hidden', maxWidth: 320, margin: '8px auto 0',
          }}>
            <div style={{
              height: '100%',
              width: `${total ? (done / total) * 100 : 0}%`,
              background: 'var(--accent)',
              transition: 'width 0.5s ease',
            }}/>
          </div>
          {allComplete && (
            <button
              className="btn btn-primary"
              disabled={rebuilding}
              onClick={rebuild}
              style={{ marginTop: 12, fontSize: 11 }}>
              {rebuilding ? 'Rebuilding…' : '↻ Rebuild showcase reel'}
            </button>
          )}
        </div>
      )}

      {/* Collapsible: per-language source dubs */}
      <div>
        <button className="btn-ghost"
                onClick={() => setShowSources(v => !v)}
                style={{ fontSize: 11, color: 'var(--ink-3)' }}>
          {showSources ? '▾' : '▸'} Individual language dubs ({total})
        </button>
        {showSources && (
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))',
            gap: 12, marginTop: 10,
          }}>
            {sortedJobs.map(j => {
              const st = statusPill(j);
              const videoUrl = j.status === 'complete'
                ? `/outputs/${j.id}/dubbed_video.mp4`
                : null;
              return (
                <div key={j.id} style={{
                  padding: 12, background: 'var(--bg)',
                  border: '1px solid var(--line)', borderRadius: 8,
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
                    <div className="mono" style={{ fontSize: 10, color: 'var(--ink-3)' }}>
                      {(j.target_lang || '').toUpperCase()}
                    </div>
                    <div style={{ fontSize: 11.5, color: 'var(--ink-2)', flex: 1 }}>
                      {langName(j.target_lang)}
                    </div>
                    <span className="dot" style={{ background: st.c }}/>
                    <span className="mono" style={{ fontSize: 9.5, color: st.c }}>{st.t}</span>
                  </div>
                  {videoUrl ? (
                    <video src={videoUrl} controls
                           style={{ width: '100%', borderRadius: 4, background: '#000' }}/>
                  ) : (
                    <div style={{
                      width: '100%', aspectRatio: '16 / 9',
                      background: 'var(--bg-2)', borderRadius: 4,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                    }}>
                      <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>
                        {j.status === 'error' ? (j.error || 'failed') : `${j.progress || 0}%`}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function BatchCard({ batch, onJumpProcessing, onJumpResult, onRefresh }) {
  const [expanded, setExpanded] = useState(false);
  const [cancelling, setCancelling] = useState(false);

  const total = batch.jobs.length;
  const done = batch.jobs.filter(j => j.status === 'complete').length;
  const errored = batch.jobs.filter(j => j.status === 'error').length;
  const running = batch.jobs.filter(j => ACTIVE_STATUSES.has(j.status) && j.status !== 'queued').length;
  const queued = batch.jobs.filter(j => j.status === 'queued' || j.status === 'scheduled').length;

  const allDone = done + errored === total && total > 0;
  const pct = total > 0 ? done / total : 0;

  // ETA — if any job is running, take its progress + remaining queued count and
  // multiply by the average completed-job duration. Rough but useful.
  const eta = useMemo(() => {
    if (allDone || running === 0) return null;
    const completedJobs = batch.jobs.filter(j => j.status === 'complete' && j.completed_at && j.started_at);
    if (completedJobs.length === 0) return null;
    const avgSec = completedJobs.reduce((sum, j) => sum + (j.completed_at - j.started_at), 0) / completedJobs.length;
    const remaining = queued + running;
    return Math.round(remaining * avgSec);
  }, [batch.jobs, queued, running, allDone]);

  const cancelBatch = async () => {
    const pendingIds = batch.jobs.filter(j => ACTIVE_STATUSES.has(j.status) || j.status === 'scheduled').map(j => j.id);
    if (pendingIds.length === 0) { onRefresh(); return; }
    if (!confirm(`Cancel ${pendingIds.length} pending job(s) in this batch?`)) return;
    setCancelling(true);
    try {
      // Issue cancels in parallel
      await Promise.all(pendingIds.map(id => fetch(`/api/dub/${id}/cancel`, { method: 'POST' })));
      onRefresh();
    } finally { setCancelling(false); }
  };

  return (
    <div style={{
      background: 'var(--bg-1)',
      border: '1px solid ' + (running > 0 ? 'var(--accent-dim)' : 'var(--line)'),
      borderRadius: 10, overflow: 'hidden',
    }}>
      {/* Summary row */}
      <div style={{ padding: '16px 20px', display: 'flex', alignItems: 'flex-start', gap: 16 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            {running > 0 && <span className="dot" style={{ background: 'var(--accent)', boxShadow: '0 0 5px var(--accent-glow)', animation: 'pulse 1.5s infinite' }}/>}
            {allDone && errored === 0 && <span className="dot" style={{ background: 'var(--accent)' }}/>}
            {allDone && errored > 0 && <span className="dot" style={{ background: 'var(--warn)' }}/>}
            {!running && !allDone && <span className="dot" style={{ background: '#8a9aff' }}/>}
            <div className="serif" style={{ fontSize: 19, color: 'var(--ink)' }}>{batch.label}</div>
          </div>
          <div style={{ fontSize: 12, color: 'var(--ink-3)', display: 'flex', gap: 14, flexWrap: 'wrap' }}>
            <span><span className="mono" style={{ color: 'var(--ink-2)' }}>{done}</span>/{total} done</span>
            {running > 0 && <span><span className="mono" style={{ color: 'var(--accent)' }}>{running}</span> running</span>}
            {queued > 0 && <span><span className="mono" style={{ color: 'var(--ink-2)' }}>{queued}</span> queued</span>}
            {errored > 0 && <span style={{ color: 'var(--err)' }}><span className="mono">{errored}</span> failed</span>}
            {eta != null && <><span style={{ color: 'var(--ink-4)' }}>·</span><span>ETA {Math.round(eta / 60)}m</span></>}
            <span style={{ color: 'var(--ink-4)' }}>·</span>
            <span>{fmtAge(batch.created)}</span>
          </div>
          {/* Aggregate progress */}
          <div style={{ marginTop: 12, maxWidth: 480 }}>
            <LongProgress value={pct} color={running > 0 ? 'var(--accent)' : 'var(--ink-2)'} height={3}/>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
          {running > 0 && (
            <button onClick={onJumpProcessing} className="btn">{I.eye} Watch</button>
          )}
          {(running > 0 || queued > 0) && (
            <button onClick={cancelBatch} disabled={cancelling} className="btn" style={{ color: 'var(--err)', borderColor: 'oklch(0.7 0.2 25 / 0.4)' }}>
              {I.cancel} {cancelling ? 'Cancelling…' : 'Cancel'}
            </button>
          )}
          <button onClick={() => setExpanded(!expanded)} className="btn">
            {expanded ? 'Hide' : 'Show'} jobs
          </button>
        </div>
      </div>

      {/* Expandable per-job list */}
      {expanded && (
        <div style={{ borderTop: '1px solid var(--line)', background: 'var(--bg)' }}>
          {batch.jobs.map(j => (
            <BatchJobRow
              key={j.id} job={j}
              onJumpProcessing={onJumpProcessing}
              onJumpResult={onJumpResult}
            />
          ))}
        </div>
      )}
    </div>
  );
}

function BatchJobRow({ job, onJumpProcessing, onJumpResult }) {
  const isRunning = ACTIVE_STATUSES.has(job.status) && job.status !== 'queued';
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '30px 2.4fr 1fr 1fr 100px',
      padding: '10px 20px', gap: 12, alignItems: 'center',
      borderBottom: '1px solid var(--line)',
      background: isRunning ? 'oklch(0.88 0.18 125 / 0.03)' : 'transparent',
    }}>
      <div style={{
        width: 22, height: 22, borderRadius: '50%',
        background: job.status === 'complete' ? 'var(--accent)' : 'transparent',
        border: '1.5px solid ' + (
          job.status === 'complete' ? 'var(--accent)'
          : isRunning ? 'var(--accent)'
          : job.status === 'error' ? 'var(--err)'
          : 'var(--line-2)'
        ),
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: job.status === 'complete' ? '#0a0a0d' : isRunning ? 'var(--accent)' : 'var(--ink-4)',
        boxShadow: isRunning ? '0 0 8px var(--accent-glow)' : 'none',
        flexShrink: 0,
      }}>
        {job.status === 'complete'
          ? <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2.5 6.5l2.5 2.5 5-6"/></svg>
          : null
        }
      </div>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 12.5, color: 'var(--ink-2)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
          {job.source_label || job.source || job.id}
        </div>
        {job.error && (
          <div className="mono" style={{ fontSize: 10, color: 'var(--err)', marginTop: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {job.error}
          </div>
        )}
      </div>
      <div>
        <StatusBadge status={job.status}/>
      </div>
      <div>
        {isRunning && (
          <div>
            <LongProgress value={(job.progress || 0) / 100} color="var(--accent)" height={2}/>
            <div className="mono" style={{ fontSize: 10, color: 'var(--ink-3)', marginTop: 4 }}>
              {(job.progress || 0).toFixed(0)}% · {job.step_detail?.slice(0, 30) || job.status}
            </div>
          </div>
        )}
      </div>
      <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end' }}>
        {job.status === 'complete' && (
          <button onClick={() => onJumpResult(job.id)} className="btn" style={{ padding: '3px 8px', fontSize: 11 }}>
            {I.eye} View
          </button>
        )}
        {isRunning && (
          <button onClick={onJumpProcessing} className="btn" style={{ padding: '3px 8px', fontSize: 11 }}>
            {I.eye} Watch
          </button>
        )}
      </div>
    </div>
  );
}

  const vramPct = (vramTotal && vramUsed != null) ? vramUsed / vramTotal : 0;

  const subsystems = [
    ['Python',    system.python,    'runtime'],
    ['ffmpeg',    system.ffmpeg,    'video / audio'],
    ['yt-dlp',    system.yt_dlp,    'URL ingestion'],

          <div style={{ flex: 1 }}/>
          <span className="chip" style={{
            color: gpu.ok ? 'var(--accent)' : 'var(--err)',
            borderColor: gpu.ok ? 'var(--accent-dim)' : 'oklch(0.7 0.2 25 / 0.3)',
            background: gpu.ok ? 'var(--accent-dim)' : 'oklch(0.7 0.2 25 / 0.1)',
          }}>
            <span className="dot" style={{ background: gpu.ok ? 'var(--accent)' : 'var(--err)' }}/>
            {gpu.ok ? 'CUDA OK' : 'No CUDA'}
          </span>
        </div>
        <div className="serif" style={{ fontSize: 20, color: 'var(--ink)', marginBottom: 6 }}>
          {gpu.name || '—'}
        </div>
        {gpu.ok ? (
          <>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginTop: 8 }}>

function ModelRow({ model, installed, last, onChanged }) {
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState(null);

  const pull = async () => {
    setBusy(true); setProgress(0);
    const fd = new FormData();
    fd.append('model', model.id);
    try {
      const r = await fetch('/api/models/pull', { method: 'POST', body: fd });
      // SSE stream
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.percent != null) setProgress(ev.percent);
            if (ev.status === 'success') setProgress(100);
            if (ev.status === 'error') alert('Pull failed: ' + (ev.error || '?'));
          } catch (_) {}
        }
      }
      onChanged();
    } catch (e) {
      alert('Pull failed: ' + e);
    } finally {
      setBusy(false); setProgress(null);
    }
  };

  const remove = async () => {
    if (!confirm(`Delete ${model.id}? Frees ${model.size}.`)) return;
    setBusy(true);
    try {
      const fd = new FormData();
      fd.append('model', model.id);
      const r = await fetch('/api/models/delete', { method: 'POST', body: fd });
      if (r.ok) onChanged();
      else alert('Delete failed');
    } finally { setBusy(false); }
  };

  return (
    <div style={{
      display: 'grid', gridTemplateColumns: '1fr 0.6fr 0.6fr 2fr 130px',
      padding: '12px 16px', gap: 12, alignItems: 'center',
      borderBottom: last ? 'none' : '1px solid var(--line)',
    }}>
      <div>
        <div style={{ fontSize: 13, fontWeight: 500, color: installed ? 'var(--ink)' : 'var(--ink-2)' }}>
          {model.name}
          {model.recommended && <span className="mono" style={{ fontSize: 9, color: 'var(--accent)', marginLeft: 6, padding: '1px 5px', border: '1px solid var(--accent)', borderRadius: 3 }}>RECOMMENDED</span>}
        </div>
        <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 2 }}>{model.id}</div>
      </div>
      <div className="mono" style={{ fontSize: 11, color: 'var(--ink-3)' }}>{model.size}</div>
      <div className="mono" style={{ fontSize: 11, color: 'var(--ink-3)' }}>{model.vram}</div>
      <div style={{ fontSize: 11.5, color: 'var(--ink-3)', lineHeight: 1.4 }}>{model.description}</div>
      <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end' }}>
        {progress != null ? (
          <div style={{ width: '100%' }}>
            <LongProgress value={progress / 100} color="var(--accent)" height={3}/>
            <div className="mono" style={{ fontSize: 10, color: 'var(--ink-3)', marginTop: 3, textAlign: 'right' }}>
              {progress.toFixed(0)}%
            </div>
          </div>
        ) : installed ? (
          <>
            <span className="chip accent">Installed</span>
            <button onClick={remove} disabled={busy} className="btn-ghost" style={{ padding: 4, color: 'var(--err)' }} title="Delete">
              {I.trash}
            </button>
          </>
        ) : (
          <button onClick={pull} disabled={busy} className="btn btn-primary" style={{ padding: '4px 10px', fontSize: 11 }}>
            {busy ? 'Pulling…' : 'Pull'}
          </button>
        )}
      </div>
    </div>
  );
}

    setLoading(true);
    fetch('/api/storage/stats').then(r => r.json()).then(d => { setStats(d); setLoading(false); }).catch(() => setLoading(false));
  }, []);
  useEffect(() => { refresh(); }, [refresh]);

  const preview = async () => {
    setPreviewing(true);
    try {
      const fd = new FormData();
      fd.append('older_than_days', String(olderThan));

              {[1, 7, 30, 90].map(d => (

                  flex: 1, padding: '5px 8px', fontSize: 11,

// ── Glossary tab — JSON editor ──────────────────────────────────────
function SysGlossary() {
  const [text, setText] = useState('');
  const [original, setOriginal] = useState('');
  const [meta, setMeta] = useState(null);
  const [error, setError] = useState(null);
  const [saving, setSaving] = useState(false);

  const load = useCallback(() => {
    fetch('/api/glossary').then(r => r.json()).then(d => {
      const t = JSON.stringify(d.data || { domains: [] }, null, 2);
      setText(t); setOriginal(t); setMeta(d);
    });
  }, []);
  useEffect(() => { load(); }, [load]);

  // Live JSON validity check
  const valid = useMemo(() => {
    try { JSON.parse(text); return true; } catch { return false; }
  }, [text]);

  const save = async () => {
    setSaving(true); setError(null);
    try {
      const fd = new FormData();
      fd.append('body', text);
      const r = await fetch('/api/glossary', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.ok) {
        setOriginal(text);
        setMeta(prev => ({ ...prev, exists: true }));
      } else {
        setError(d.error || 'Save failed');
      }
    } catch (e) { setError(String(e)); }
    finally { setSaving(false); }
  };

  const revert = () => { setText(original); setError(null); };

  const removeFile = async () => {
    if (!confirm('Delete user_glossary.json? Built-in glossary remains.')) return;
    await fetch('/api/glossary', { method: 'DELETE' });
    load();
  };

  // Compute stats from current valid text
  const stats = useMemo(() => {
    try {
      const d = JSON.parse(text);
      const domains = d.domains || [];
      const total = domains.reduce((s, dom) => s + Object.keys(dom.terms || {}).length, 0);
      return { domainCount: domains.length, termCount: total };
    } catch { return { domainCount: 0, termCount: 0 }; }
  }, [text]);

  const dirty = text !== original;

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 12, flexWrap: 'wrap' }}>
        <div className="serif" style={{ fontSize: 22 }}>User glossary</div>
        <span style={{ fontSize: 12, color: 'var(--ink-3)' }}>· JSON overrides · merged over built-in BJJ terms</span>
        <div style={{ flex: 1 }}/>
        <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>
          {stats.termCount} terms · {stats.domainCount} domain{stats.domainCount === 1 ? '' : 's'}
        </span>
      </div>

      <div style={{ background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 8, overflow: 'hidden' }}>
        <div style={{
          padding: '8px 12px', background: 'var(--bg-2)',
          borderBottom: '1px solid var(--line)',
          display: 'flex', alignItems: 'center', gap: 8, fontSize: 11,
        }}>
          <span className="mono" style={{ color: 'var(--ink-3)' }}>
            presets/user_glossary.json {meta?.exists ? '' : '(will be created on save)'}
          </span>
          <div style={{ flex: 1 }}/>
          <span className="chip" style={{
            color: valid ? 'var(--accent)' : 'var(--err)',
            borderColor: valid ? 'var(--accent-dim)' : 'oklch(0.7 0.2 25 / 0.3)',
            background: valid ? 'var(--accent-dim)' : 'oklch(0.7 0.2 25 / 0.08)',
          }}>
            <span className="dot" style={{ background: valid ? 'var(--accent)' : 'var(--err)' }}/>
            {valid ? 'Valid JSON' : 'Invalid JSON'}
          </span>
        </div>
        <textarea
          value={text}
          onChange={e => setText(e.target.value)}
          spellCheck={false}
          style={{
            width: '100%', minHeight: 360,
            padding: 14, background: 'var(--bg-1)', border: 'none',
            fontFamily: 'var(--mono)', fontSize: 12, lineHeight: 1.6,
            color: valid ? 'var(--ink)' : 'var(--err)',
            resize: 'vertical', outline: 'none',
          }}
        />
      </div>

      <div style={{ display: 'flex', gap: 8, marginTop: 12, flexWrap: 'wrap' }}>
        <button onClick={save} disabled={!valid || !dirty || saving} className="btn btn-primary">
          {I.check} {saving ? 'Saving…' : 'Save glossary'}
        </button>
        <button onClick={revert} disabled={!dirty} className="btn">{I.refresh} Revert</button>
        <div style={{ flex: 1 }}/>
        {meta?.exists && (
          <button onClick={removeFile} className="btn" style={{ color: 'var(--err)', borderColor: 'oklch(0.7 0.2 25 / 0.4)' }}>
            {I.trash} Delete user file
          </button>
        )}
      </div>

      {error && (
        <div style={{ marginTop: 10, padding: 10, background: 'oklch(0.7 0.2 25 / 0.08)', border: '1px solid oklch(0.7 0.2 25 / 0.3)', borderRadius: 6, fontSize: 11.5, color: 'var(--ink-2)' }}>
          {I.warn} {error}
        </div>
      )}

      <div style={{ marginTop: 24, padding: 14, background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 8 }}>
        <div className="caps" style={{ marginBottom: 8 }}>Format</div>
        <div style={{ fontSize: 11.5, color: 'var(--ink-3)', lineHeight: 1.6 }}>
          Top-level <code className="mono" style={{ color: 'var(--ink-2)' }}>domains</code> array. Each domain has{' '}
          <code className="mono" style={{ color: 'var(--ink-2)' }}>name</code>,{' '}
          <code className="mono" style={{ color: 'var(--ink-2)' }}>triggers</code> (array of keywords matched against your{' '}
          <code className="mono" style={{ color: 'var(--ink-2)' }}>context_hint</code>),{' '}
          <code className="mono" style={{ color: 'var(--ink-2)' }}>target_lang</code>, and{' '}
          <code className="mono" style={{ color: 'var(--ink-2)' }}>terms</code> mapping source → target translations.
        </div>
      </div>
    </div>
  );
}

        size="~1.4 GB · one-time download"
        steps={[
          'git clone https://github.com/Rudrabha/Wav2Lip.git',
          'pip install -r Wav2Lip/requirements.txt',
          'wget -P Wav2Lip/checkpoints/ https://iitbacin.sharepoint.com/.../wav2lip_gan.pth',
        ]}
        onRefresh={() => fetch('/api/lip_sync/status').then(r => r.json()).then(setLipStatus)}
        repoDir={lipStatus?.repo_dir}
      />
      <AddonCard
        name="audio-separator"
        detail="Preserves original music and SFX during dubbing. Without this, enabling 'Keep background audio' on the Home form silently fails."
        installed={null}
        size="~800 MB with UVR model"
        steps={['pip install audio-separator']}
      />
    </div>
  );
}

function AddonCard({ name, detail, installed, size, steps, onRefresh, repoDir }) {
  const known = installed != null;
  return (
    <div style={{
      padding: 18, background: 'var(--bg-1)',
      border: '1px solid ' + (installed ? 'var(--line)' : known ? 'oklch(0.78 0.15 60 / 0.2)' : 'var(--line)'),
      borderRadius: 10,
    }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 10 }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
            <div className="serif" style={{ fontSize: 20 }}>{name}</div>
            {installed === true && <span className="chip accent">Installed</span>}
            {installed === false && (
              <span className="chip" style={{ color: 'var(--warn)', borderColor: 'oklch(0.78 0.15 60 / 0.3)', background: 'oklch(0.78 0.15 60 / 0.08)' }}>
                Not installed
              </span>
            )}
            {installed == null && <span className="chip" style={{ color: 'var(--ink-3)' }}>Status unknown</span>}
          </div>
          <div style={{ fontSize: 12, color: 'var(--ink-3)', lineHeight: 1.5, maxWidth: 640 }}>{detail}</div>
          {repoDir && (
            <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 6 }}>
              Detected at: {repoDir}
            </div>
          )}
        </div>
        <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', flexShrink: 0 }}>{size}</div>
      </div>

      {installed !== true && (
        <div style={{ marginTop: 10 }}>
          <div className="caps" style={{ marginBottom: 6 }}>Install</div>
          {steps.map((cmd, i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 8,
              padding: '7px 10px', background: 'var(--bg-2)', border: '1px solid var(--line)',
              borderRadius: 5, marginBottom: 4,
            }}>
              <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', width: 18 }}>{i + 1}</span>
              <code className="mono" style={{ fontSize: 11, color: 'var(--ink-2)', flex: 1, overflow: 'auto', whiteSpace: 'nowrap' }}>{cmd}</code>
              <button onClick={() => navigator.clipboard?.writeText(cmd)} className="btn-ghost" style={{ padding: 3, color: 'var(--ink-3)' }} title="Copy">{I.copy}</button>
            </div>
          ))}
          {onRefresh && (
            <button onClick={onRefresh} className="btn" style={{ marginTop: 8 }}>
              {I.refresh} Check again
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ── Quick-test form — short clip × N languages ─────────────────────
// `kind` ∈ 'quick' | 'showcase' — same form structure, slightly different
// copy. Quick test = N separate dubbed videos for A/B comparison.
// Showcase = N segments stitched into one continuous video that cycles
// through the languages with a small corner badge.
function QuickTestForm({
  kind = 'quick',
  mode, setMode, videoFile, setVideoFile, ytUrl, setYtUrl,
  refFile, voicePreset, ttsSpeed,
  trimSeconds, setTrimSeconds, langs, setLangs,
  onSubmit, submitting, error,
}) {
  const isShowcase = kind === 'showcase';
  const TRIM_STOPS = [30, 60, 90, 120];
  const DEFAULT_LANGS = ['es', 'fr', 'de', 'ja', 'pt'];
  const pickableLangs = LANGS.filter(l => l.c !== 'auto');

  const toggleLang = (code) => {
    if (langs.includes(code)) {
      if (langs.length > 2) setLangs(langs.filter(c => c !== code));
    } else {
      if (langs.length < 6) setLangs([...langs, code]);
    }
  };

  const estMinutes = Math.max(1, Math.round((langs.length * trimSeconds * 0.8) / 60));
  const sourceReady = (mode === 'file' && videoFile) || (mode === 'url' && ytUrl.trim());
  const langsOk = langs.length >= 2 && langs.length <= 6;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
      {/* Source — file or URL */}
      <div>
        <div className="caps" style={{ marginBottom: 8 }}>
          {isShowcase ? 'Source · multilingual showcase reel' : 'Source · short clip'}
        </div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
          <button className={'btn ' + (mode === 'file' ? 'btn-primary' : '')}
                  onClick={() => setMode('file')}>File</button>
          <button className={'btn ' + (mode === 'url' ? 'btn-primary' : '')}
                  onClick={() => setMode('url')}>URL</button>
        </div>
        {mode === 'file' ? (
          <input type="file" accept="video/*"
                 onChange={e => setVideoFile(e.target.files?.[0] || null)}
                 className="field"/>
        ) : (
          <input className="field" placeholder="https://youtube.com/watch?v=…"
                 value={ytUrl} onChange={e => setYtUrl(e.target.value)}/>
        )}
        <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 6 }}>
          {isShowcase
            ? `Source will be trimmed to the first ${trimSeconds}s, then split into ${langs.length} language segments (sentence-aligned) and stitched into one video.`
            : `Source will be trimmed to the first ${trimSeconds}s before dubbing.`}
        </div>
      </div>

      {/* Trim slider — discrete stops */}
      <div>
        <div className="caps" style={{ marginBottom: 8 }}>Trim duration</div>
        <div style={{ display: 'flex', gap: 6 }}>
          {TRIM_STOPS.map(s => (
            <button key={s}
              onClick={() => setTrimSeconds(s)}
              className={'btn ' + (trimSeconds === s ? 'btn-primary' : '')}
              style={{ flex: 1 }}>
              {s}s
            </button>
          ))}
        </div>
      </div>

      {/* Language chips */}
      <div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 8 }}>
          <div className="caps">Target languages · {langs.length} of 2–6</div>
          <div style={{ flex: 1 }}/>
          <button className="btn-ghost"
                  style={{ fontSize: 11, color: 'var(--ink-3)' }}
                  onClick={() => setLangs(DEFAULT_LANGS)}>
            Reset to defaults
          </button>
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {pickableLangs.map(l => {
            const on = langs.includes(l.c);
            const disabled = !on && langs.length >= 6;
            return (
              <button key={l.c}
                onClick={() => toggleLang(l.c)}
                disabled={disabled}
                style={{
                  padding: '6px 10px', borderRadius: 4,
                  background: on ? 'var(--accent)' : 'var(--bg-1)',
                  color: on ? '#0a0a0d' : 'var(--ink-2)',
                  border: '1px solid ' + (on ? 'var(--accent)' : 'var(--line)'),
                  fontSize: 11.5, cursor: disabled ? 'not-allowed' : 'pointer',
                  opacity: disabled ? 0.4 : 1,
                }}>
                {l.n}
              </button>
            );
          })}
        </div>
        {!langsOk && (
          <div className="mono" style={{ fontSize: 10, color: 'var(--err)', marginTop: 6 }}>
            Pick 2–6 languages.
          </div>
        )}
      </div>

      {/* Runtime estimate */}
      <div style={{ padding: 12, background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 6 }}>
        <div className="mono" style={{ fontSize: 11, color: 'var(--ink-3)' }}>
          Estimated total runtime: ~{estMinutes} min
          ({langs.length} jobs × {trimSeconds}s clip, sequential on the GPU queue
          {isShowcase ? ' · +~10s for stitch step at the end' : ''})
        </div>
        {isShowcase && (
          <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 6, lineHeight: 1.5 }}>
            Each language gets ≈{Math.round(trimSeconds / Math.max(langs.length, 1))}s
            of screen time, snapped to the nearest sentence end. A small
            <span style={{ display: 'inline-block', padding: '1px 6px', margin: '0 4px',
                           background: 'rgba(0,0,0,0.55)', color: '#fff',
                           borderRadius: 3, fontSize: 9 }}>· LL ·</span>
            badge in the top-right corner shows the current language.
          </div>
        )}
      </div>

      {/* Error */}
      {error && (
        <div className="mono" style={{ fontSize: 11, color: 'var(--err)' }}>{error}</div>
      )}

      {/* Submit */}
      <button
        className="btn btn-primary"
        disabled={submitting || !sourceReady || !langsOk}
        onClick={onSubmit}
        style={{ width: '100%', justifyContent: 'center', padding: '12px 16px' }}>
        {submitting
          ? 'Submitting…'
          : !sourceReady
            ? (mode === 'file' ? 'Choose a video file' : 'Paste a URL')
            : (isShowcase
                ? `Build showcase reel ▸ ${langs.length} langs × ${trimSeconds}s`
                : `Start quick test ▸ ${langs.length} langs × ${trimSeconds}s`)}
      </button>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════
// HOME VIEW — upload + configure form, real backend wiring
// One long editorial form (per scoping survey).
// ═══════════════════════════════════════════════════════════════════
function HomeView({ system, voicePresets, sphereOn, onJobSubmitted }) {
  // ── Form state with localStorage persistence (all keys match old UI) ──
  const [mode, setMode] = useState('url');             // 'file' | 'url'
  const [batchMode, setBatchMode] = useState(false);
  const [quickTestMode, setQuickTestMode] = useState(false);
  const [showcaseMode, setShowcaseMode] = useState(false);
  // Mutually exclusive — flipping one resets the others
  const switchTo = (target) => {
    setBatchMode(target === 'batch');
    setQuickTestMode(target === 'quick');
    setShowcaseMode(target === 'showcase');
  };
  const [videoFile, setVideoFile] = useState(null);
  const [ytUrl, setYtUrl] = useState('');
  const [refFile, setRefFile] = useState(null);

  const [batchFiles, setBatchFiles] = useState([]);    // File[]
  const [batchUrls, setBatchUrls] = useState('');      // newline-separated
  const [batchLabel, setBatchLabel] = useState('');
  const [batchSchedule, setBatchSchedule] = useState('');

  const [srcLang, setSrcLang] = useState(() => _lsGet('srcLang', 'auto'));
  const [tgtLang, setTgtLang] = useState(() => _lsGet('tgtLang', 'ru'));
  const [model, setModel] = useState(() => _lsGet('model', 'aya-expanse:8b'));
  const [whisperModel, setWhisperModel] = useState(() => _lsGet('whisperModel', 'large-v3'));
  const [speakerMode, setSpeakerMode] = useState(() => _lsGet('speakerMode', 'main'));
  const [voicePreset, setVoicePreset] = useState(() => _lsGet('voicePreset', 'auto'));
  const [voiceStyle, setVoiceStyle] = useState('');
  const [ttsSpeed, setTtsSpeed] = useState(() => _lsGet('ttsSpeed', 'balanced'));
  const [contextHint, setContextHint] = useState(() => _lsGet('contextHint', ''));

  const [keepBg, setKeepBg] = useState(() => _lsGet('keepBg', false));
  const [autoDenoise, setAutoDenoise] = useState(() => _lsGet('autoDenoise', false));
  const [lipSync, setLipSync] = useState(() => _lsGet('lipSync', false));
  const [lipStatus, setLipStatus] = useState(null);
  useEffect(() => {
    fetch('/api/lip_sync/status').then(r => r.json()).then(setLipStatus).catch(() => {});
  }, []);
  const [llmRegroup, setLlmRegroup] = useState(() => _lsGet('llmRegroup', false));
  const [wizardReview, setWizardReview] = useState(() => _lsGet('wizardReview', false));

  // Quick-test mode state — independent from single/batch state above
  const [qtTrimSeconds, setQtTrimSeconds] = useState(() => _lsGet('qtTrim', 60));
  const [qtLangs, setQtLangs] = useState(() => {
    const stored = _lsGet('qtLangs', null);
    return Array.isArray(stored) && stored.length >= 2 ? stored : ['es', 'fr', 'de', 'ja', 'pt'];
  });
  useEffect(() => { _lsSet('qtTrim', qtTrimSeconds); }, [qtTrimSeconds]);
  useEffect(() => { _lsSet('qtLangs', qtLangs); }, [qtLangs]);

  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState(null);

  // Persist all preferences
  useEffect(() => { _lsSet('srcLang', srcLang); }, [srcLang]);
  useEffect(() => { _lsSet('tgtLang', tgtLang); }, [tgtLang]);
  useEffect(() => { _lsSet('model', model); }, [model]);
  useEffect(() => { _lsSet('whisperModel', whisperModel); }, [whisperModel]);
  useEffect(() => { _lsSet('speakerMode', speakerMode); }, [speakerMode]);
  useEffect(() => { _lsSet('voicePreset', voicePreset); }, [voicePreset]);
  useEffect(() => { _lsSet('ttsSpeed', ttsSpeed); }, [ttsSpeed]);
  useEffect(() => { _lsSet('contextHint', contextHint); }, [contextHint]);
  useEffect(() => { _lsSet('keepBg', keepBg); }, [keepBg]);
  useEffect(() => { _lsSet('autoDenoise', autoDenoise); }, [autoDenoise]);
  useEffect(() => { _lsSet('lipSync', lipSync); }, [lipSync]);
  useEffect(() => { _lsSet('llmRegroup', llmRegroup); }, [llmRegroup]);
  useEffect(() => { _lsSet('wizardReview', wizardReview); }, [wizardReview]);

  // Installed Ollama models (from /api/system response). Fall back to a known set
  // if /api/system hasn't returned yet so the user can still pick something.
  const installedModels = useMemo(() => {
    const m = system?.ollama?.models;
    if (m && m.length) return m.map(x => typeof x === 'string' ? x : x.name).filter(Boolean);
    return ['aya-expanse:8b', 'qwen3:8b', 'gemma3:12b', 'llama3.2:3b'];
  }, [system]);

  // CTA label — depends on mode and schedule
  const submitLabel = (() => {
    if (submitting) return 'Submitting…';
    if (batchMode) {
      const c = batchFiles.length + batchUrls.split('\n').filter(l => l.trim()).length;
      if (c === 0) return 'Add at least one source';
      if (batchSchedule) return `Schedule ${c} videos for ${new Date(batchSchedule).toLocaleString()}`;
      return `Queue ${c} videos now`;
    }
    if (mode === 'file' && !videoFile) return 'Choose a video file';
    if (mode === 'url' && !ytUrl.trim()) return 'Paste a URL';
    return 'Start dubbing';
  })();

  const canSubmit = !submitting && (
    batchMode
      ? (batchFiles.length + batchUrls.split('\n').filter(l => l.trim()).length) > 0
      : (mode === 'file' ? !!videoFile : !!ytUrl.trim())
  );

  // ── Submit handlers ─────────────────────────────────────────────
  const submitSingle = async () => {
    setError(null); setSubmitting(true);
    const fd = new FormData();
    if (mode === 'file' && videoFile) fd.append('video', videoFile);
    else if (mode === 'url' && ytUrl) fd.append('source', ytUrl);
    if (refFile) fd.append('reference', refFile);
    fd.append('source_lang', srcLang);
    fd.append('target_lang', tgtLang);
    fd.append('model', model);
    fd.append('keep_bg', keepBg);
    fd.append('whisper_model', whisperModel);
    fd.append('speaker_mode', speakerMode);
    fd.append('context_hint', contextHint);
    fd.append('voice_style', voiceStyle);
    fd.append('voice_preset', voicePreset);
    fd.append('tts_speed', ttsSpeed);
    fd.append('wizard_mode', wizardReview ? 'review_translation' : 'auto');
    fd.append('auto_denoise', autoDenoise);
    fd.append('llm_regroup', llmRegroup);
    fd.append('lip_sync', lipSync);
    try {
      const r = await fetch('/api/dub', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.job_id) onJobSubmitted(d.job_id);
      else setError(d.error || d.detail || 'Submit failed');
    } catch (e) {
      setError(String(e.message || e));
    } finally {
      setSubmitting(false);
    }
  };

  const submitBatch = async () => {
    setError(null); setSubmitting(true);
    const fd = new FormData();
    batchFiles.forEach(f => fd.append('videos', f));
    if (batchUrls.trim()) fd.append('sources', batchUrls.trim());
    if (refFile) fd.append('reference', refFile);
    fd.append('source_lang', srcLang);
    fd.append('target_lang', tgtLang);
    fd.append('model', model);
    fd.append('keep_bg', keepBg);
    fd.append('whisper_model', whisperModel);
    fd.append('speaker_mode', speakerMode);
    fd.append('context_hint', contextHint);
    fd.append('voice_style', voiceStyle);
    fd.append('voice_preset', voicePreset);
    fd.append('tts_speed', ttsSpeed);
    fd.append('wizard_mode', 'auto');
    fd.append('auto_denoise', autoDenoise);
    fd.append('llm_regroup', llmRegroup);
    fd.append('batch_label', batchLabel || `Batch ${new Date().toLocaleString()}`);
    if (batchSchedule) {
      const ts = Math.floor(new Date(batchSchedule).getTime() / 1000);
      if (ts > Math.floor(Date.now() / 1000) + 10) fd.append('scheduled_at', String(ts));
    }
    try {
      const r = await fetch('/api/dub/batch', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.batch_id || d.job_ids) onJobSubmitted(null);
      else setError(d.error || d.detail || 'Batch submit failed');
    } catch (e) {
      setError(String(e.message || e));
    } finally {
      setSubmitting(false);
    }
  };

  const submitQuickTest = async () => {
    setError(null); setSubmitting(true);
    const fd = new FormData();
    if (mode === 'file' && videoFile) fd.append('video', videoFile);
    else if (mode === 'url' && ytUrl) fd.append('source', ytUrl);
    if (refFile) fd.append('reference', refFile);
    fd.append('trim_seconds', String(qtTrimSeconds));
    fd.append('target_langs', qtLangs.join(','));
    fd.append('source_lang', srcLang);
    fd.append('model', model);
    fd.append('whisper_model', whisperModel);
    fd.append('speaker_mode', speakerMode);
    fd.append('voice_preset', voicePreset);
    fd.append('voice_style', voiceStyle);
    fd.append('tts_speed', ttsSpeed);
    fd.append('keep_bg', keepBg);
    fd.append('auto_denoise', autoDenoise);
    fd.append('context_hint', contextHint);
    try {
      const r = await fetch('/api/quick_test', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.batch_id || d.job_ids) onJobSubmitted(null);
      else setError(d.error || d.detail || 'Quick-test submit failed');
    } catch (e) {
      setError(String(e.message || e));
    } finally {
      setSubmitting(false);
    }
  };

  const submitShowcase = async () => {
    // Showcase reuses the Quick Test form state (qtTrimSeconds, qtLangs)
    // but posts to /api/showcase, which triggers stitch-into-one after
    // all per-language dubs finish.
    setError(null); setSubmitting(true);
    const fd = new FormData();
    if (mode === 'file' && videoFile) fd.append('video', videoFile);
    else if (mode === 'url' && ytUrl) fd.append('source', ytUrl);
    if (refFile) fd.append('reference', refFile);
    fd.append('trim_seconds', String(qtTrimSeconds));
    fd.append('target_langs', qtLangs.join(','));
    fd.append('source_lang', srcLang);
    fd.append('model', model);
    fd.append('whisper_model', whisperModel);
    fd.append('speaker_mode', speakerMode);
    fd.append('voice_preset', voicePreset);
    fd.append('voice_style', voiceStyle);
    fd.append('tts_speed', ttsSpeed);
    fd.append('keep_bg', keepBg);
    fd.append('auto_denoise', autoDenoise);
    fd.append('context_hint', contextHint);
    try {
      const r = await fetch('/api/showcase', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.batch_id || d.job_ids) onJobSubmitted(null);
      else setError(d.error || d.detail || 'Showcase submit failed');
    } catch (e) {
      setError(String(e.message || e));
    } finally {
      setSubmitting(false);
    }
  };

  const submit = () => {
    if (showcaseMode) return submitShowcase();
    if (quickTestMode) return submitQuickTest();
    if (batchMode) return submitBatch();
    return submitSingle();
  };

  // Cmd/Ctrl+Enter shortcut
  useEffect(() => {
    const onKey = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && canSubmit) {
        e.preventDefault();
        submit();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });

  return (
    <div style={{ flex: 1, overflow: 'auto', position: 'relative', background: 'var(--bg)' }}>
      {/* Hero with sphere on the right */}
      <Hero sphereOn={sphereOn}/>

      {/* Form — narrow editorial column */}
      <div style={{ maxWidth: 760, margin: '0 auto', padding: '0 32px 80px' }}>

        {/* Error banner */}
        {error && (
          <div style={{
            margin: '0 0 24px',
            padding: '12px 14px',
            background: 'oklch(0.7 0.2 25 / 0.08)',
            border: '1px solid oklch(0.7 0.2 25 / 0.3)',
            borderRadius: 8, display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <span style={{ color: 'var(--err)' }}>{I.cancel}</span>
            <div style={{ flex: 1, fontSize: 12.5, color: 'var(--ink)' }}>{error}</div>
            <button className="btn-ghost" style={{ padding: 4, color: 'var(--ink-3)' }} onClick={() => setError(null)}>{I.cancel}</button>
          </div>
        )}

        {/* 01 SOURCE */}
        <SectionHeader index={1} title="Source media" subtitle="One file or batch · file upload or URL"/>

        {/* Single vs Batch toggle */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 16, flexWrap: 'wrap' }}>
          <ModeBtn active={!batchMode && !quickTestMode && !showcaseMode} onClick={() => switchTo('single')} label="Single video"/>
          <ModeBtn active={batchMode}     onClick={() => switchTo('batch')}    label="Batch — many videos"/>
          <ModeBtn active={quickTestMode} onClick={() => switchTo('quick')}    label="Quick test · multi-lang"/>
          <ModeBtn active={showcaseMode}  onClick={() => switchTo('showcase')} label="Showcase · stitched reel"/>
        </div>

        {showcaseMode && (
          <QuickTestForm
            kind="showcase"
            mode={mode} setMode={setMode}
            videoFile={videoFile} setVideoFile={setVideoFile}
            ytUrl={ytUrl} setYtUrl={setYtUrl}
            refFile={refFile}
            voicePreset={voicePreset}
            ttsSpeed={ttsSpeed}
            trimSeconds={qtTrimSeconds} setTrimSeconds={setQtTrimSeconds}
            langs={qtLangs} setLangs={setQtLangs}
            onSubmit={submitShowcase}
            submitting={submitting}
            error={error}/>
        )}

        {quickTestMode && (
          <QuickTestForm
            mode={mode} setMode={setMode}
            videoFile={videoFile} setVideoFile={setVideoFile}
            ytUrl={ytUrl} setYtUrl={setYtUrl}
            refFile={refFile}
            voicePreset={voicePreset}
            ttsSpeed={ttsSpeed}
            trimSeconds={qtTrimSeconds} setTrimSeconds={setQtTrimSeconds}
            langs={qtLangs} setLangs={setQtLangs}
            onSubmit={submitQuickTest}
            submitting={submitting}
            error={error}
          />
        )}

        {!quickTestMode && !showcaseMode && (<>
        {!batchMode && (
          <SingleSource
            mode={mode} setMode={setMode}
            videoFile={videoFile} setVideoFile={setVideoFile}
            ytUrl={ytUrl} setYtUrl={setYtUrl}
          />
        )}
        {batchMode && (
          <BatchSource
            files={batchFiles} setFiles={setBatchFiles}

        <div style={{ marginTop: 14 }}>
          <Field label="TTS speed">
            <div style={{ display: 'flex', gap: 6 }}>
              {['fast', 'balanced', 'quality'].map(s => (

                  flex: 1, justifyContent: 'center',
                  borderColor: ttsSpeed === s ? 'var(--accent)' : 'var(--line)',
                  background: ttsSpeed === s ? 'var(--bg-2)' : 'var(--bg-1)',
                  color: ttsSpeed === s ? 'var(--ink)' : 'var(--ink-2)',

            </div>
          </Field>
        </div>
        <div style={{ marginTop: 14 }}>
          <Field label="Voice reference (optional)" hint="WAV or MP3. 10-30s of clean speech.">
            <FileSlot file={refFile} setFile={setRefFile} accept="audio/*,video/*"/>

        {/* 04 ADVANCED */}
        <SectionHeader index={4} title="Advanced"/>
        <Toggle value={keepBg}     onChange={setKeepBg}     label="Keep background audio (music / SFX)" hint="Uses audio-separator. Install required — see System."/>
        <Toggle value={autoDenoise} onChange={setAutoDenoise} label="Auto-denoise audio" hint="+3-5s · ON for noisy footage (mat sounds, crowd, AC hum) · OFF for clean studio audio"/>
        <Toggle value={lipSync} onChange={setLipSync}
                disabled={lipStatus && !lipStatus.installed}
                label={'Sync lips with Wav2Lip' + (lipStatus && !lipStatus.installed ? ' (not installed)' : '')}
                hint={lipStatus && !lipStatus.installed
                  ? 'Wav2Lip not detected. Install via System tab to enable. Adds 2-5x video duration to processing time.'
                  : 'Auto-runs Wav2Lip after dubbing. Best for talking-head footage; fails on action shots or far-away faces. Adds 2-5x video duration.'}/>
        <Toggle value={llmRegroup}  onChange={setLlmRegroup}  label="LLM segment regrouping" hint="+20-40s on long videos · fixes mid-sentence breaks · best for podcasts, lectures, seminars"/>
        <Toggle value={wizardReview} onChange={setWizardReview} label="Wizard mode — pause for review" hint="Pause after translation so you can edit segments and replace voice references."/>

        <div style={{ marginTop: 14 }}>
          <Field label="Translation context (optional)" hint="A short hint for the LLM. Examples: 'BJJ grappling seminar', 'tech podcast', 'cooking show'.">
            <input
              className="field"
              value={contextHint}
              onChange={e => setContextHint(e.target.value)}
              placeholder="e.g. BJJ seminar, tech podcast"
            />
          </Field>
        </div>

        {/* 05 BATCH-ONLY OPTIONS */}
        {batchMode && (
          <>
            <SectionHeader index={5} title="Batch options"/>
            <Field label="Batch label (optional)">
              <input
                className="field"
                value={batchLabel}
                onChange={e => setBatchLabel(e.target.value)}
                placeholder="e.g. BJJ Course · Week 1"
              />
            </Field>
            <div style={{ marginTop: 14 }}>
              <Field label="Schedule start (optional)" hint="Empty = start now. Set to run overnight on cheap GPU hours.">
                <input
                  className="field"
                  type="datetime-local"
                  value={batchSchedule}
                  onChange={e => setBatchSchedule(e.target.value)}
                />
              </Field>
            </div>
          </>
        )}

        {/* SUBMIT */}
        <div style={{ marginTop: 36, display: 'flex', gap: 10, alignItems: 'center' }}>
          <button onClick={submit} disabled={!canSubmit} className="btn btn-primary" style={{
            flex: 1, justifyContent: 'center', padding: '12px 16px', fontSize: 13,

          </button>
          <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>⌘↵</span>
        </div>
        </>)}
      </div>
    </div>
  );

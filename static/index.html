// ── File drop zone ──
function FileSlot({ file, setFile, accept }) {
  const [drag, setDrag] = useState(false);
  const inputRef = useRef(null);

  const onPick = (f) => { if (f) setFile(f); };

  if (file) {
    return (
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '10px 12px',
        background: 'var(--bg-2)', border: '1px solid var(--accent-dim)',
        borderRadius: 6,
      }}>
        <div style={{
          width: 28, height: 28, borderRadius: 5,
          background: 'var(--bg-3)', border: '1px solid var(--line)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: 'var(--accent)', flexShrink: 0,
        }}>{I.check}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 12.5, color: 'var(--ink)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{file.name}</div>
          <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 2 }}>
            {(file.size / (1024 * 1024)).toFixed(1)} MB
          </div>
        </div>
        <button className="btn-ghost" style={{ padding: 4, color: 'var(--ink-3)' }} onClick={() => setFile(null)}>{I.cancel}</button>
      </div>
    );
  }

  return (
    <div
      className={'dropzone' + (drag ? ' dragging' : '')}
      onClick={() => inputRef.current?.click()}
      onDragOver={e => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={e => {
        e.preventDefault(); setDrag(false);
        if (e.dataTransfer.files[0]) onPick(e.dataTransfer.files[0]);
      }}
    >
      <input ref={inputRef} type="file" accept={accept} style={{ display: 'none' }}
        onChange={e => onPick(e.target.files[0])}/>
      <div style={{
        width: 36, height: 36, margin: '0 auto 8px', borderRadius: 8,
        background: 'var(--bg-2)', border: '1px solid var(--line)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: 'var(--ink-2)',
      }}>{I.upload}</div>
      <div style={{ fontSize: 13, color: 'var(--ink)', marginBottom: 3 }}>Drop or click to choose</div>
      <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>video/audio · up to 4 GB</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// ROOT
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [view, setView] = useState('home');
  const [system, setSystem] = useState(null);
  const [voicePresets, setVoicePresets] = useState([]);
  const [jobs, setJobs] = useState([]);
  const [sphereOn, setSphereOn] = useState(true);

  // Which job is currently shown on Result / Review. Set when the user
  // clicks "View" / "Review" from History, or auto-set to most recent
  // complete / awaiting_review job otherwise.
  const [selectedResultJobId, setSelectedResultJobId] = useState(null);
  const [selectedReviewJobId, setSelectedReviewJobId] = useState(null);

  // Live system polling — every 5s, just like the old UI
  useEffect(() => {
    const refresh = () => fetch('/api/system').then(r => r.json()).then(setSystem).catch(() => {});
    refresh();
    const t = setInterval(refresh, 5000);
    return () => clearInterval(t);
  }, []);

  // Voice presets — refetched whenever the user switches views so newly
  // uploaded references from the Voices tab show up in the dub form picker.
  useEffect(() => {
    fetch('/api/voices').then(r => r.json()).then(d => setVoicePresets(d.presets || [])).catch(() => {});
  }, [view]);

  // Jobs polling — every 2s when any job is active, else every 10s
  useEffect(() => {
    let stopped = false;
    const fetchJobs = async () => {
      try {
        const r = await fetch('/api/jobs');
        const d = await r.json();
        if (!stopped) setJobs(d.jobs || []);
      } catch (_) {}
    };
    fetchJobs();
    const interval = jobs.some(j => ACTIVE_STATUSES.has(j.status)) ? 2000 : 10000;
    const t = setInterval(fetchJobs, interval);
    return () => { stopped = true; clearInterval(t); };
  }, [jobs.some(j => ACTIVE_STATUSES.has(j.status))]);

  const runningJob = jobs.find(j => ACTIVE_STATUSES.has(j.status));
  const awaitingReviewCount = jobs.filter(j => j.status === 'awaiting_translation_review').length;

  // Keyboard shortcuts: 1-6 switch views, Shift+G toggles sphere
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.shiftKey && e.key.toLowerCase() === 'g') setSphereOn(s => !s);
      if (!e.metaKey && !e.ctrlKey && !e.shiftKey) {
        if (e.key === '1') setView('home');
        if (e.key === '2') setView('processing');
        if (e.key === '3') setView('review');
        if (e.key === '4') setView('result');
        if (e.key === '5') setView('history');
        if (e.key === '6') setView('batch');
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const onJobSubmitted = (jobId) => {
    // After submit, jump to processing so the user sees the live job
    setView('processing');
    // Force-refresh jobs list in case poll hasn't ticked yet
    fetch('/api/jobs').then(r => r.json()).then(d => setJobs(d.jobs || [])).catch(() => {});
  };

  return (
    <div style={{ width: '100vw', height: '100vh', display: 'flex', background: 'var(--bg)' }}>
      <LeftRail
        view={view} setView={setView}
        runningJob={runningJob}
        awaitingReviewCount={awaitingReviewCount}
        system={system}
      />

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <TopBar
          view={view}
          runningJob={runningJob}
          awaitingReviewCount={awaitingReviewCount}
          onJumpToProcessing={() => setView('processing')}
          onJumpToReview={() => setView('review')}
        />

        {view === 'home' && (
          <HomeView
            system={system}
            voicePresets={voicePresets}
            sphereOn={sphereOn}
            onJobSubmitted={onJobSubmitted}
          />
        )}

        {view === 'processing' && (
          <ProcessingView
            runningJob={runningJob}
            sphereOn={sphereOn}
            onJobCancelled={() => setView('history')}
            onSwitchToHome={() => setView('home')}
          />
        )}

        {view === 'review' && (
          <ReviewView
            jobs={jobs}
            selectedJobId={selectedReviewJobId}
            voicePresets={voicePresets}
            onContinued={() => { setSelectedReviewJobId(null); setView('processing'); }}
            onCancel={() => { setSelectedReviewJobId(null); setView('history'); }}
            onPickJob={setSelectedReviewJobId}
          />
        )}

        {view === 'result' && (
          <ResultView
            jobs={jobs}
            selectedJobId={selectedResultJobId}
            voicePresets={voicePresets}
            onPickJob={setSelectedResultJobId}
            onSwitchToHome={() => setView('home')}
            onSwitchToHistory={() => setView('history')}
          />
        )}

        {view === 'history' && (
          <HistoryView
            jobs={jobs}
            onJumpProcessing={() => setView('processing')}
            onJumpReview={(id) => { setSelectedReviewJobId(id); setView('review'); }}
            onJumpResult={(id) => { setSelectedResultJobId(id); setView('result'); }}
            onRefresh={() => fetch('/api/jobs').then(r => r.json()).then(d => setJobs(d.jobs || []))}
          />
        )}

        {view === 'batch' && (
          <BatchView
            jobs={jobs}
            onRefresh={() => fetch('/api/jobs').then(r => r.json()).then(d => setJobs(d.jobs || []))}
            onJumpProcessing={() => setView('processing')}
            onJumpResult={(id) => { setSelectedResultJobId(id); setView('result'); }}
            onJumpHome={() => setView('home')}
          />
        )}

        {view === 'voices' && <VoicesView/>}

        {view === 'glossary' && <GlossaryEditor/>}

        {view === 'system' && (
          <SystemView system={system} onRefreshSystem={() => fetch('/api/system').then(r => r.json()).then(setSystem)}/>
        )}
      </div>

      {/* Sphere on/off tweak strip */}
      <div style={{
        position: 'fixed', bottom: 12, right: 16,
        padding: '6px 10px',
        background: 'var(--bg-2)', border: '1px solid var(--line)',
        borderRadius: 999,
        display: 'flex', alignItems: 'center', gap: 10,
        fontSize: 10, fontFamily: 'var(--mono)',
        color: 'var(--ink-4)', zIndex: 10,
      }}>
        <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
          <input type="checkbox" checked={sphereOn} onChange={e => setSphereOn(e.target.checked)} style={{ accentColor: 'var(--accent)' }}/>
          sphere
        </label>
        <span style={{ color: 'var(--ink-4)' }}>·</span>
        <span>1-6 views · ⇧G sphere</span>
      </div>
    </div>
  );
}

          </button>
        </div>
        <div className="serif" style={{ fontSize: 32, marginBottom: 6 }}>
          Voices, <span style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>cloneable.</span>
        </div>
        <div style={{ fontSize: 13, color: 'var(--ink-3)', maxWidth: 640, marginBottom: 32 }}>
          Upload short reference clips (5-30 sec, clear speech, one speaker, no music) and
          reuse them across dubs. Files live in <span className="mono" style={{ color: 'var(--ink-2)' }}>presets/voices/</span> —
          re-scanned on every call, no restart needed.
        </div>

        {loading && <div className="mono" style={{ color: 'var(--ink-4)' }}>Loading…</div>}

        {/* My voices (file-based) */}
        {!loading && (
          <div style={{ marginBottom: 40 }}>
            <div className="caps" style={{ marginBottom: 12 }}>
              My voices · {filePresets.length}
            </div>
            {filePresets.length === 0 ? (
              <div style={{
                padding: 32, textAlign: 'center', borderRadius: 8,
                background: 'var(--bg-1)', border: '1px dashed var(--line)',
              }}>
                <div style={{ fontSize: 14, color: 'var(--ink-3)', marginBottom: 10 }}>
                  No custom voices yet.
                </div>
                <button className="btn" onClick={() => setUploadOpen(true)}>
                  Upload your first reference
                </button>
              </div>
            ) : (
              <div style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
                gap: 14,
              }}>
                {filePresets.map(p => (
                  <VoiceCard key={p.id} preset={p}
                             onEdit={() => setEditing(p)}
                             onDeleted={load}/>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Built-in style presets — read-only */}
        {!loading && stylePresets.length > 0 && (
          <div>
            <div className="caps" style={{ marginBottom: 12 }}>
              Built-in styles · {stylePresets.length}
            </div>
            <div className="mono" style={{ fontSize: 11, color: 'var(--ink-4)', marginBottom: 10 }}>
              No reference audio — these are voice-design prompts with a fixed seed
              for reproducibility. Cannot be edited or deleted.
            </div>
            <div style={{
              display: 'grid',
              gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
              gap: 10,
            }}>
              {stylePresets.map(p => (
                <div key={p.id} style={{
                  padding: 12, background: 'var(--bg-1)',
                  border: '1px solid var(--line)', borderRadius: 6,
                }}>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{p.name}</div>
                  {p.style && (
                    <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', marginTop: 4 }}>
                      {p.style}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {uploadOpen && (
        <VoiceUploadModal
          onClose={() => setUploadOpen(false)}
          onUploaded={() => { setUploadOpen(false); load(); }}/>
      )}
      {editing && (
        <VoiceEditModal preset={editing}
          onClose={() => setEditing(null)}
          onSaved={() => { setEditing(null); load(); }}/>
      )}
    </div>
  );
}

function VoiceCard({ preset, onEdit, onDeleted }) {
  const [confirming, setConfirming] = useState(false);
  const [busy, setBusy] = useState(false);
  const del = async () => {
    setBusy(true);
    try {
      const r = await fetch(`/api/voice_presets/${preset.id}`, { method: 'DELETE' });
      if (r.ok) onDeleted();
      else alert((await r.json()).error || 'Delete failed');
    } finally { setBusy(false); setConfirming(false); }
  };
  return (
    <div style={{
      padding: 14, background: 'var(--bg-1)',
      border: '1px solid var(--line)', borderRadius: 8,
    }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginBottom: 4 }}>
        <div style={{ fontSize: 14, fontWeight: 500, flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {preset.name}
        </div>
        {preset.gender && (
          <span className="mono" style={{ fontSize: 9, color: 'var(--ink-4)' }}>
            {preset.gender.charAt(0).toUpperCase()}
          </span>
        )}
        {preset.language && (
          <span className="mono" style={{
            fontSize: 9, padding: '1px 5px', borderRadius: 3,
            background: 'var(--bg-2)', color: 'var(--ink-3)',
          }}>
            {preset.language.toUpperCase()}
          </span>
        )}
      </div>
      {preset.description && (
        <div style={{ fontSize: 11.5, color: 'var(--ink-3)', marginBottom: 8, lineHeight: 1.5 }}>
          {preset.description}
        </div>
      )}
      <audio src={preset.audio_url} controls
             style={{ width: '100%', height: 32 }}/>
      <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 8, flexWrap: 'wrap' }}>
        <span className="mono" style={{ fontSize: 9, color: 'var(--ink-4)' }}>
          {(preset.file_size / 1024).toFixed(0)} KB · {preset.file_ext}
        </span>
        {(preset.tags || []).map(t => (
          <span key={t} className="mono" style={{
            fontSize: 9, padding: '1px 5px', borderRadius: 3,
            background: 'var(--bg-2)', color: 'var(--ink-3)',
          }}>{t}</span>
        ))}
        <div style={{ flex: 1 }}/>
        <button className="btn-ghost" onClick={onEdit}
                style={{ padding: '2px 6px', fontSize: 10 }}>
          edit
        </button>
        {confirming ? (
          <>
            <button className="btn" onClick={del} disabled={busy}
                    style={{ padding: '2px 6px', fontSize: 10, color: 'var(--err)' }}>
              {busy ? '…' : 'confirm'}
            </button>
            <button className="btn-ghost" onClick={() => setConfirming(false)}
                    style={{ padding: '2px 4px', fontSize: 10 }}>×</button>
          </>
        ) : (
          <button className="btn-ghost" onClick={() => setConfirming(true)}
                  style={{ padding: '2px 6px', fontSize: 10, color: 'var(--err)' }}>
            delete
          </button>
        )}
      </div>
    </div>
  );
}

function VoiceUploadModal({ onClose, onUploaded }) {
  const [file, setFile] = useState(null);
  const [name, setName] = useState('');
  const [description, setDescription] = useState('');
  const [gender, setGender] = useState('');
  const [language, setLanguage] = useState('');
  const [tags, setTags] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  // Auto-derive name from filename
  const onFile = (f) => {
    setFile(f);
    if (f && !name) {
      const stem = f.name.replace(/\.[^.]+$/, '').replace(/[^A-Za-z0-9 _\-]/g, '_');
      setName(stem.slice(0, 50));
    }
  };

  const submit = async () => {
    setError(null);
    if (!file) return setError('Choose an audio file');
    if (!name.trim()) return setError('Name is required');
    setBusy(true);
    try {
      const fd = new FormData();
      fd.append('audio', file);
      fd.append('name', name.trim());
      fd.append('description', description);
      fd.append('gender', gender);
      fd.append('language', language);
      fd.append('tags', tags);
      const r = await fetch('/api/voice_presets', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.ok) onUploaded();
      else setError(d.error || 'Upload failed');
    } catch (e) { setError(String(e.message || e)); }
    finally { setBusy(false); }
  };

  return (
    <ModalShell title="Upload voice reference" onClose={onClose}>
      <div className="caps" style={{ marginBottom: 6 }}>Audio file</div>
      <input type="file" accept="audio/*"
             onChange={e => onFile(e.target.files?.[0] || null)}
             className="field" style={{ marginBottom: 14 }}/>

      <div className="caps" style={{ marginBottom: 6 }}>Name *</div>
      <input value={name} onChange={e => setName(e.target.value)}
             className="field" placeholder="e.g. alex_warm" maxLength={50}
             style={{ marginBottom: 14 }}/>

      <div style={{ display: 'flex', gap: 12, marginBottom: 14 }}>
        <div style={{ flex: 1 }}>
          <div className="caps" style={{ marginBottom: 6 }}>Gender</div>
          <select value={gender} onChange={e => setGender(e.target.value)} className="field">
            <option value="">(unset)</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="neutral">Neutral</option>
          </select>
        </div>
        <div style={{ flex: 1 }}>
          <div className="caps" style={{ marginBottom: 6 }}>Language hint</div>
          <select value={language} onChange={e => setLanguage(e.target.value)} className="field">
            <option value="">(any)</option>
            {LANGS.filter(l => l.c !== 'auto').map(l => (
              <option key={l.c} value={l.c}>{l.n}</option>
            ))}
          </select>
        </div>
      </div>

      <div className="caps" style={{ marginBottom: 6 }}>Description</div>
      <textarea value={description} onChange={e => setDescription(e.target.value)}
                className="field" rows={2}
                placeholder="e.g. warm middle-aged narrator, calm and clear"
                style={{ marginBottom: 14, resize: 'vertical' }}/>

      <div className="caps" style={{ marginBottom: 6 }}>Tags (comma-separated)</div>
      <input value={tags} onChange={e => setTags(e.target.value)}
             className="field" placeholder="narrator, calm, en-us"
             style={{ marginBottom: 18 }}/>

      {error && (
        <div className="mono" style={{ fontSize: 11, color: 'var(--err)', marginBottom: 12 }}>{error}</div>
      )}

      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
        <button className="btn" onClick={onClose} disabled={busy}>Cancel</button>
        <button className="btn btn-primary" onClick={submit} disabled={busy || !file || !name.trim()}>
          {busy ? 'Uploading…' : 'Save voice'}
        </button>
      </div>
    </ModalShell>
  );
}

function VoiceEditModal({ preset, onClose, onSaved }) {
  const [name, setName] = useState(preset.name || '');
  const [description, setDescription] = useState(preset.description || '');
  const [gender, setGender] = useState(preset.gender || '');
  const [language, setLanguage] = useState(preset.language || '');
  const [tags, setTags] = useState((preset.tags || []).join(', '));
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  const submit = async () => {
    setError(null); setBusy(true);
    try {
      const fd = new FormData();
      if (name.trim() && name.trim() !== preset.name) fd.append('name', name.trim());
      fd.append('description', description);
      fd.append('gender', gender);
      fd.append('language', language);
      fd.append('tags', tags);
      const r = await fetch(`/api/voice_presets/${preset.id}`, { method: 'PUT', body: fd });
      const d = await r.json();
      if (d.ok) onSaved();
      else setError(d.error || 'Save failed');
    } catch (e) { setError(String(e.message || e)); }
    finally { setBusy(false); }
  };

  return (
    <ModalShell title={`Edit · ${preset.name}`} onClose={onClose}>
      <div className="caps" style={{ marginBottom: 6 }}>Name (rename)</div>
      <input value={name} onChange={e => setName(e.target.value)}
             className="field" maxLength={50}
             style={{ marginBottom: 14 }}/>

      <div style={{ display: 'flex', gap: 12, marginBottom: 14 }}>
        <div style={{ flex: 1 }}>
          <div className="caps" style={{ marginBottom: 6 }}>Gender</div>
          <select value={gender} onChange={e => setGender(e.target.value)} className="field">
            <option value="">(unset)</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="neutral">Neutral</option>
          </select>
        </div>
        <div style={{ flex: 1 }}>
          <div className="caps" style={{ marginBottom: 6 }}>Language</div>
          <select value={language} onChange={e => setLanguage(e.target.value)} className="field">
            <option value="">(any)</option>
            {LANGS.filter(l => l.c !== 'auto').map(l => (
              <option key={l.c} value={l.c}>{l.n}</option>
            ))}
          </select>
        </div>
      </div>

      <div className="caps" style={{ marginBottom: 6 }}>Description</div>
      <textarea value={description} onChange={e => setDescription(e.target.value)}
                className="field" rows={2} style={{ marginBottom: 14, resize: 'vertical' }}/>

      <div className="caps" style={{ marginBottom: 6 }}>Tags</div>
      <input value={tags} onChange={e => setTags(e.target.value)}
             className="field" style={{ marginBottom: 18 }}/>

      {error && (
        <div className="mono" style={{ fontSize: 11, color: 'var(--err)', marginBottom: 12 }}>{error}</div>
      )}
      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
        <button className="btn" onClick={onClose} disabled={busy}>Cancel</button>
        <button className="btn btn-primary" onClick={submit} disabled={busy}>
          {busy ? 'Saving…' : 'Save changes'}
        </button>
      </div>
    </ModalShell>
  );
}

function ModalShell({ title, onClose, children }) {

}


// ═══════════════════════════════════════════════════════════════════
// GLOSSARY EDITOR — structured editor for translation overrides
// Replaces the JSON textarea with collapsible domain cards + a
// row-per-term table.
// ═══════════════════════════════════════════════════════════════════
function GlossaryEditor() {
  const [data, setData] = useState({ domains: [] });
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [exists, setExists] = useState(false);
  const [error, setError] = useState(null);
  const [savedAt, setSavedAt] = useState(null);

  const load = async () => {
    setLoading(true);
    try {
      const r = await fetch('/api/glossary');
      const d = await r.json();
      setExists(!!d.exists);
      setData(d.data || { domains: [] });
    } catch (e) { setError(String(e.message || e)); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const save = async () => {
    setSaving(true); setError(null);
    try {
      const fd = new FormData();
      fd.append('body', JSON.stringify(data));
      const r = await fetch('/api/glossary', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.ok) { setExists(true); setSavedAt(Date.now()); }
      else setError(d.error || 'Save failed');
    } catch (e) { setError(String(e.message || e)); }
    setSaving(false);
  };

  const del = async () => {
    if (!confirm('Delete user_glossary.json? Built-in glossary stays active.')) return;
    await fetch('/api/glossary', { method: 'DELETE' });
    load();
  };

  const addDomain = () => {
    setData({
      ...data,
      domains: [...(data.domains || []), {
        name: 'New domain',
        triggers: [],
        target_lang: '',
        terms: {},
      }],
    });
  };

  const updateDomain = (i, patch) => {
    const next = [...data.domains];
    next[i] = { ...next[i], ...patch };
    setData({ ...data, domains: next });
  };

  const removeDomain = (i) => {
    if (!confirm(`Remove domain "${data.domains[i].name}"?`)) return;
    setData({ ...data, domains: data.domains.filter((_, idx) => idx !== i) });
  };

  const totalTerms = (data.domains || []).reduce(
    (a, d) => a + Object.keys(d.terms || {}).length, 0);

  return (
    <div style={{ flex: 1, overflow: 'auto', padding: 32, background: 'var(--bg)' }}>
      <div style={{ maxWidth: 1080, margin: '0 auto' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 8 }}>
          <div className="caps">Translation overrides</div>
          <div style={{ flex: 1 }}/>
          {exists && (
            <button className="btn-ghost" onClick={del}
                    style={{ fontSize: 11, color: 'var(--err)' }}>
              Delete user glossary
            </button>
          )}
        </div>
        <div className="serif" style={{ fontSize: 32, marginBottom: 6 }}>
          Glossary, <span style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>your terms.</span>
        </div>
        <div style={{ fontSize: 13, color: 'var(--ink-3)', maxWidth: 700, marginBottom: 32 }}>
          Force specific translations for technical terms, brand names, jargon.
          Each <em>domain</em> activates only when the source contains one of its trigger words.
          Built-in BJJ glossary stays active alongside whatever you add here.
        </div>

        {loading ? (
          <div className="mono" style={{ color: 'var(--ink-4)' }}>Loading…</div>
        ) : (
          <>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16, marginBottom: 24 }}>
              {(data.domains || []).map((d, i) => (
                <GlossaryDomainCard key={i} domain={d}
                  onChange={p => updateDomain(i, p)}
                  onRemove={() => removeDomain(i)}/>
              ))}
              {(!data.domains || data.domains.length === 0) && (
                <div style={{
                  padding: 32, textAlign: 'center',
                  background: 'var(--bg-1)', border: '1px dashed var(--line)', borderRadius: 8,
                }}>
                  <div style={{ color: 'var(--ink-3)', marginBottom: 10 }}>
                    No custom domains yet.
                  </div>
                </div>
              )}
            </div>

            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
              <button className="btn" onClick={addDomain}>+ Add domain</button>
              <div style={{ flex: 1 }}/>
              <span className="mono" style={{ fontSize: 11, color: 'var(--ink-4)' }}>
                {data.domains?.length || 0} domain(s) · {totalTerms} term(s)
              </span>
              <button className="btn btn-primary" onClick={save} disabled={saving}>
                {saving ? 'Saving…' : 'Save glossary'}
              </button>
            </div>

            {error && (
              <div className="mono" style={{ fontSize: 11, color: 'var(--err)' }}>{error}</div>
            )}
            {savedAt && !error && (
              <div className="mono" style={{ fontSize: 11, color: 'var(--accent)' }}>
                Saved · {new Date(savedAt).toLocaleTimeString()}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

function GlossaryDomainCard({ domain, onChange, onRemove }) {
  const [expanded, setExpanded] = useState(true);
  const [newSrc, setNewSrc] = useState('');
  const [newDst, setNewDst] = useState('');
  const [newTrigger, setNewTrigger] = useState('');

  const terms = domain.terms || {};
  const triggers = domain.triggers || [];

  const addTerm = () => {
    const src = newSrc.trim(), dst = newDst.trim();
    if (!src || !dst) return;
    onChange({ terms: { ...terms, [src]: dst } });
    setNewSrc(''); setNewDst('');
  };
  const removeTerm = (k) => {
    const next = { ...terms };
    delete next[k];
    onChange({ terms: next });
  };
  const updateTerm = (oldKey, newKey, newVal) => {
    const next = {};
    Object.entries(terms).forEach(([k, v]) => {
      if (k === oldKey) next[newKey] = newVal;
      else next[k] = v;
    });
    onChange({ terms: next });
  };
  const addTrigger = () => {
    const t = newTrigger.trim().toLowerCase();
    if (t && !triggers.includes(t)) onChange({ triggers: [...triggers, t] });
    setNewTrigger('');
  };
  const removeTrigger = (t) => {
    onChange({ triggers: triggers.filter(x => x !== t) });
  };

  return (
    <div style={{
      background: 'var(--bg-1)', border: '1px solid var(--line)',
      borderRadius: 8, overflow: 'hidden',
    }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px',
                    borderBottom: expanded ? '1px solid var(--line)' : 'none' }}>
        <button className="btn-ghost" onClick={() => setExpanded(e => !e)}
                style={{ padding: 4, color: 'var(--ink-3)' }}>
          {expanded ? '▾' : '▸'}
        </button>
        <input value={domain.name || ''}
               onChange={e => onChange({ name: e.target.value })}
               className="field"
               style={{ flex: 1, fontSize: 15, fontWeight: 500 }}
               placeholder="Domain name (e.g. Cooking EN→RU)"/>
        <select value={domain.target_lang || ''}
                onChange={e => onChange({ target_lang: e.target.value })}
                className="field" style={{ width: 130 }}>
          <option value="">any lang</option>
          {LANGS.filter(l => l.c !== 'auto').map(l => (
            <option key={l.c} value={l.c}>{l.n}</option>
          ))}
        </select>
        <span className="mono" style={{ fontSize: 10, color: 'var(--ink-4)', minWidth: 56, textAlign: 'right' }}>
          {Object.keys(terms).length} terms
        </span>
        <button className="btn-ghost" onClick={onRemove}
                style={{ padding: 4, color: 'var(--err)' }} title="Remove domain">
          {I.cancel}
        </button>
      </div>

      {expanded && (
        <div style={{ padding: 16 }}>
          {/* Triggers */}
          <div style={{ marginBottom: 16 }}>
            <div className="caps" style={{ marginBottom: 6 }}>
              Activate when source contains any of:
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, alignItems: 'center' }}>
              {triggers.map(t => (
                <span key={t} style={{
                  padding: '3px 6px 3px 8px', borderRadius: 4,
                  background: 'var(--bg-2)', display: 'inline-flex', alignItems: 'center', gap: 4,
                  fontSize: 11,
                }}>
                  {t}
                  <button className="btn-ghost" onClick={() => removeTrigger(t)}
                          style={{ padding: '0 2px', fontSize: 12, color: 'var(--ink-3)' }}>×</button>
                </span>
              ))}
              <input value={newTrigger}
                     onChange={e => setNewTrigger(e.target.value)}
                     onKeyDown={e => e.key === 'Enter' && addTrigger()}
                     onBlur={addTrigger}
                     placeholder="+ trigger word"
                     className="field" style={{ flex: '0 1 160px', fontSize: 11, padding: '4px 8px' }}/>
            </div>
          </div>

          {/* Terms table */}
          <div className="caps" style={{ marginBottom: 6 }}>Term overrides</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            <div style={{
              display: 'grid',
              gridTemplateColumns: '1fr 16px 1fr 32px',
              gap: 8, padding: '4px 8px',
              fontSize: 10, color: 'var(--ink-4)',
              fontFamily: 'var(--mono)',
            }}>
              <div>SOURCE</div>
              <div></div>
              <div>TRANSLATION</div>
              <div></div>
            </div>
            {Object.entries(terms).map(([src, dst]) => (
              <div key={src} style={{
                display: 'grid',
                gridTemplateColumns: '1fr 16px 1fr 32px',
                gap: 8, padding: '4px 0', alignItems: 'center',
              }}>
                <input defaultValue={src}
                       onBlur={e => {
                         const v = e.target.value.trim();
                         if (v && v !== src) updateTerm(src, v, dst);
                       }}
                       className="field" style={{ fontSize: 12 }}/>
                <div style={{ textAlign: 'center', color: 'var(--ink-4)' }}>→</div>
                <input defaultValue={dst}
                       onBlur={e => updateTerm(src, src, e.target.value)}
                       className="field" style={{ fontSize: 12 }}/>
                <button className="btn-ghost" onClick={() => removeTerm(src)}
                        style={{ padding: 4, color: 'var(--err)' }}>{I.cancel}</button>
              </div>
            ))}
            {/* New term row */}
            <div style={{
              display: 'grid',
              gridTemplateColumns: '1fr 16px 1fr 32px',
              gap: 8, padding: '4px 0', alignItems: 'center',
              borderTop: '1px dashed var(--line)', marginTop: 6, paddingTop: 10,
            }}>
              <input value={newSrc} onChange={e => setNewSrc(e.target.value)}
                     onKeyDown={e => e.key === 'Enter' && addTerm()}
                     placeholder="Source term"
                     className="field" style={{ fontSize: 12 }}/>
              <div style={{ textAlign: 'center', color: 'var(--ink-4)' }}>→</div>
              <input value={newDst} onChange={e => setNewDst(e.target.value)}
                     onKeyDown={e => e.key === 'Enter' && addTerm()}
                     placeholder="Translation"
                     className="field" style={{ fontSize: 12 }}/>
              <button className="btn-ghost" onClick={addTerm}
                      style={{ padding: 4, color: 'var(--accent)' }}
                      disabled={!newSrc.trim() || !newDst.trim()}>+</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
